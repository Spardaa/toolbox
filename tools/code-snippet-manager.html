<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Snippet Manager | Developer Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #f8fafc;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #1e293b;
            border-radius: 10px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #0f172a;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        .filter-select {
            padding: 12px 20px;
            border: 2px solid #1e293b;
            border-radius: 10px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 0.95rem;
            cursor: pointer;
            min-width: 150px;
        }

        .filter-select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #1e293b;
            color: #e2e8f0;
            border: 2px solid #334155;
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: #f8fafc;
            font-size: 1rem;
        }

        .snippet-list {
            max-height: 60vh;
            overflow-y: auto;
        }

        .snippet-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            border: 2px solid transparent;
        }

        .snippet-item:hover {
            background: #334155;
        }

        .snippet-item.active {
            background: #3b82f6;
            color: white;
        }

        .snippet-item-title {
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .snippet-item-meta {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            gap: 10px;
        }

        .snippet-item.active .snippet-item-meta {
            color: rgba(255,255,255,0.7);
        }

        .editor-panel {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }

        .editor-header {
            padding: 15px 20px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .editor-title-input {
            background: transparent;
            border: none;
            color: #f8fafc;
            font-size: 1.2rem;
            font-weight: 600;
            flex: 1;
            min-width: 200px;
        }

        .editor-title-input:focus {
            outline: none;
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .editor-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-group textarea {
            min-height: 300px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: vertical;
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 2px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            min-height: 44px;
            align-items: center;
        }

        .tag {
            background: #3b82f6;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-remove {
            cursor: pointer;
            opacity: 0.7;
        }

        .tag-remove:hover {
            opacity: 1;
        }

        .tags-input input {
            border: none;
            background: transparent;
            color: #e2e8f0;
            flex: 1;
            min-width: 100px;
            padding: 4px;
        }

        .tags-input input:focus {
            outline: none;
        }

        .preview-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .preview-section h4 {
            margin-bottom: 10px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .preview-code {
            background: #282c34;
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-code pre {
            margin: 0;
            padding: 15px;
            overflow-x: auto;
        }

        .preview-code code {
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            font-size: 0.85rem;
            color: #64748b;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #f8fafc;
        }

        .modal-content p {
            margin-bottom: 20px;
            color: #94a3b8;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #ef4444;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                order: 1;
            }

            .editor-panel {
                order: 2;
            }

            .snippet-list {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Code Snippet Manager</h1>
            <p class="subtitle">Save, organize, and quickly access your code snippets</p>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search snippets...">
            </div>
            <select class="filter-select" id="languageFilter">
                <option value="all">All Languages</option>
            </select>
            <select class="filter-select" id="tagFilter">
                <option value="all">All Tags</option>
            </select>
            <button class="btn btn-primary" id="newSnippetBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"></path>
                </svg>
                New Snippet
            </button>
            <button class="btn btn-secondary" id="exportBtn">Export</button>
            <label class="btn btn-secondary" id="importBtn">
                Import
                <input type="file" accept=".json" style="display: none;" id="importFile">
            </label>
        </div>

        <div class="main-content">
            <aside class="sidebar">
                <h3>Snippets (<span id="snippetCount">0</span>)</h3>
                <div class="snippet-list" id="snippetList">
                    <div class="empty-state">
                        <p>No snippets yet. Create your first one!</p>
                    </div>
                </div>
            </aside>

            <div class="editor-panel" id="editorPanel">
                <div class="empty-state" id="emptyEditor">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <p>Select a snippet or create a new one</p>
                </div>

                <div id="editorContent" style="display: none;">
                    <div class="editor-header">
                        <input type="text" class="editor-title-input" id="snippetTitle" placeholder="Snippet title...">
                        <div class="editor-actions">
                            <button class="btn btn-secondary" id="copyBtn">Copy Code</button>
                            <button class="btn btn-primary" id="saveBtn">Save</button>
                            <button class="btn btn-danger" id="deleteBtn">Delete</button>
                        </div>
                    </div>
                    <div class="editor-body">
                        <div class="form-group">
                            <label>Language</label>
                            <select class="filter-select" id="snippetLanguage" style="width: 100%;">
                                <option value="javascript">JavaScript</option>
                                <option value="typescript">TypeScript</option>
                                <option value="python">Python</option>
                                <option value="html">HTML</option>
                                <option value="css">CSS</option>
                                <option value="json">JSON</option>
                                <option value="sql">SQL</option>
                                <option value="bash">Bash</option>
                                <option value="markdown">Markdown</option>
                                <option value="java">Java</option>
                                <option value="csharp">C#</option>
                                <option value="cpp">C++</option>
                                <option value="go">Go</option>
                                <option value="rust">Rust</option>
                                <option value="php">PHP</option>
                                <option value="ruby">Ruby</option>
                                <option value="swift">Swift</option>
                                <option value="kotlin">Kotlin</option>
                                <option value="scala">Scala</option>
                                <option value="yaml">YAML</option>
                                <option value="xml">XML</option>
                                <option value="plaintext">Plain Text</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tags</label>
                            <div class="tags-input" id="tagsInput">
                                <input type="text" id="tagInput" placeholder="Add tag and press Enter...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Code</label>
                            <textarea id="snippetCode" placeholder="// Your code here..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Notes (optional)</label>
                            <input type="text" id="snippetNotes" placeholder="Add notes about this snippet...">
                        </div>
                        <div class="preview-section">
                            <h4>Preview</h4>
                            <div class="preview-code">
                                <pre><code id="codePreview" class="hljs">// Your code preview will appear here</code></pre>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>Delete Snippet?</h3>
            <p>This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Saved!</div>

    <script>
        const STORAGE_KEY = 'code-snippets';

        let snippets = [];
        let currentSnippetId = null;
        let currentTags = [];

        // Sample snippets for new users
        const sampleSnippets = [
            {
                id: 'sample-1',
                title: 'Fetch with Error Handling',
                language: 'javascript',
                tags: ['fetch', 'api', 'error-handling'],
                code: `async function fetchWithErrorHandling(url, options = {}) {
  try {
    const response = await fetch(url, {
      headers: {
        'Content-Type': 'application/json',
        ...options.headers
      },
      ...options
    });

    if (!response.ok) {
      throw new Error(\`HTTP error! status: \${response.status}\`);
    }

    const data = await response.json();
    return { success: true, data };
  } catch (error) {
    console.error('Fetch error:', error);
    return { success: false, error: error.message };
  }
}`,
                notes: 'Reusable fetch wrapper with error handling',
                createdAt: Date.now(),
                updatedAt: Date.now()
            },
            {
                id: 'sample-2',
                title: 'Debounce Function',
                language: 'javascript',
                tags: ['utility', 'performance', 'events'],
                code: `function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

// Usage:
const handleSearch = debounce((query) => {
  console.log('Searching for:', query);
}, 300);`,
                notes: 'Classic debounce implementation for rate-limiting',
                createdAt: Date.now(),
                updatedAt: Date.now()
            },
            {
                id: 'sample-3',
                title: 'CSS Flexbox Center',
                language: 'css',
                tags: ['flexbox', 'centering', 'layout'],
                code: `.center {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Or use place-items with grid */
.center-grid {
  display: grid;
  place-items: center;
}`,
                notes: 'Quick centering snippets for flex and grid',
                createdAt: Date.now(),
                updatedAt: Date.now()
            }
        ];

        function init() {
            loadSnippets();
            setupEventListeners();
            renderSnippetList();
            updateFilters();
        }

        function loadSnippets() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                snippets = JSON.parse(stored);
            } else {
                // Load sample snippets for new users
                snippets = sampleSnippets;
                saveToStorage();
            }
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(snippets));
        }

        function setupEventListeners() {
            document.getElementById('newSnippetBtn').addEventListener('click', createNewSnippet);
            document.getElementById('saveBtn').addEventListener('click', saveCurrentSnippet);
            document.getElementById('deleteBtn').addEventListener('click', () => showModal('deleteModal'));
            document.getElementById('copyBtn').addEventListener('click', copyCode);
            document.getElementById('cancelDelete').addEventListener('click', () => hideModal('deleteModal'));
            document.getElementById('confirmDelete').addEventListener('click', deleteCurrentSnippet);
            document.getElementById('exportBtn').addEventListener('click', exportSnippets);
            document.getElementById('importFile').addEventListener('change', importSnippets);
            document.getElementById('searchInput').addEventListener('input', renderSnippetList);
            document.getElementById('languageFilter').addEventListener('change', renderSnippetList);
            document.getElementById('tagFilter').addEventListener('change', renderSnippetList);

            document.getElementById('snippetTitle').addEventListener('input', markUnsaved);
            document.getElementById('snippetLanguage').addEventListener('change', markUnsaved);
            document.getElementById('snippetCode').addEventListener('input', () => {
                markUnsaved();
                updatePreview();
            });
            document.getElementById('snippetNotes').addEventListener('input', markUnsaved);

            // Tag input
            const tagInput = document.getElementById('tagInput');
            tagInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && tagInput.value.trim()) {
                    addTag(tagInput.value.trim());
                    tagInput.value = '';
                    e.preventDefault();
                }
            });
        }

        function renderSnippetList() {
            const list = document.getElementById('snippetList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const languageFilter = document.getElementById('languageFilter').value;
            const tagFilter = document.getElementById('tagFilter').value;

            let filtered = snippets.filter(s => {
                const matchesSearch = !search ||
                    s.title.toLowerCase().includes(search) ||
                    s.code.toLowerCase().includes(search) ||
                    s.tags.some(t => t.toLowerCase().includes(search));
                const matchesLang = languageFilter === 'all' || s.language === languageFilter;
                const matchesTag = tagFilter === 'all' || s.tags.includes(tagFilter);
                return matchesSearch && matchesLang && matchesTag;
            });

            // Sort by updated date
            filtered.sort((a, b) => b.updatedAt - a.updatedAt);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <p>No snippets found</p>
                    </div>
                `;
            } else {
                list.innerHTML = filtered.map(s => `
                    <div class="snippet-item ${s.id === currentSnippetId ? 'active' : ''}" data-id="${s.id}">
                        <div class="snippet-item-title">${escapeHtml(s.title)}</div>
                        <div class="snippet-item-meta">
                            <span>${s.language}</span>
                            <span>${s.tags.length} tags</span>
                        </div>
                    </div>
                `).join('');

                list.querySelectorAll('.snippet-item').forEach(item => {
                    item.addEventListener('click', () => loadSnippet(item.dataset.id));
                });
            }

            document.getElementById('snippetCount').textContent = snippets.length;
        }

        function updateFilters() {
            const languages = [...new Set(snippets.map(s => s.language))].sort();
            const tags = [...new Set(snippets.flatMap(s => s.tags))].sort();

            const languageFilter = document.getElementById('languageFilter');
            languageFilter.innerHTML = '<option value="all">All Languages</option>' +
                languages.map(l => `<option value="${l}">${l}</option>`).join('');

            const tagFilter = document.getElementById('tagFilter');
            tagFilter.innerHTML = '<option value="all">All Tags</option>' +
                tags.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        function createNewSnippet() {
            const newSnippet = {
                id: 'snippet-' + Date.now(),
                title: 'New Snippet',
                language: 'javascript',
                tags: [],
                code: '',
                notes: '',
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            snippets.unshift(newSnippet);
            saveToStorage();
            loadSnippet(newSnippet.id);
            renderSnippetList();
            updateFilters();

            document.getElementById('snippetTitle').focus();
            document.getElementById('snippetTitle').select();
        }

        function loadSnippet(id) {
            const snippet = snippets.find(s => s.id === id);
            if (!snippet) return;

            currentSnippetId = id;
            currentTags = [...snippet.tags];

            document.getElementById('snippetTitle').value = snippet.title;
            document.getElementById('snippetLanguage').value = snippet.language;
            document.getElementById('snippetCode').value = snippet.code;
            document.getElementById('snippetNotes').value = snippet.notes || '';

            renderTags();
            updatePreview();

            document.getElementById('emptyEditor').style.display = 'none';
            document.getElementById('editorContent').style.display = 'block';

            renderSnippetList();
        }

        function saveCurrentSnippet() {
            if (!currentSnippetId) return;

            const snippet = snippets.find(s => s.id === currentSnippetId);
            if (!snippet) return;

            snippet.title = document.getElementById('snippetTitle').value || 'Untitled';
            snippet.language = document.getElementById('snippetLanguage').value;
            snippet.code = document.getElementById('snippetCode').value;
            snippet.notes = document.getElementById('snippetNotes').value;
            snippet.tags = [...currentTags];
            snippet.updatedAt = Date.now();

            saveToStorage();
            renderSnippetList();
            updateFilters();
            showToast('Snippet saved!');
        }

        function deleteCurrentSnippet() {
            if (!currentSnippetId) return;

            snippets = snippets.filter(s => s.id !== currentSnippetId);
            saveToStorage();

            currentSnippetId = null;
            document.getElementById('emptyEditor').style.display = 'block';
            document.getElementById('editorContent').style.display = 'none';

            renderSnippetList();
            updateFilters();
            hideModal('deleteModal');
            showToast('Snippet deleted');
        }

        function copyCode() {
            const code = document.getElementById('snippetCode').value;
            navigator.clipboard.writeText(code).then(() => {
                showToast('Code copied to clipboard!');
            });
        }

        function addTag(tag) {
            if (!currentTags.includes(tag)) {
                currentTags.push(tag);
                renderTags();
                markUnsaved();
            }
        }

        function removeTag(tag) {
            currentTags = currentTags.filter(t => t !== tag);
            renderTags();
            markUnsaved();
        }

        function renderTags() {
            const container = document.getElementById('tagsInput');
            const input = document.getElementById('tagInput');

            container.innerHTML = currentTags.map(t => `
                <span class="tag">
                    ${escapeHtml(t)}
                    <span class="tag-remove" onclick="removeTag('${escapeHtml(t)}')">&times;</span>
                </span>
            `).join('') + '<input type="text" id="tagInput" placeholder="Add tag and press Enter...">';

            const newInput = document.getElementById('tagInput');
            newInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && newInput.value.trim()) {
                    addTag(newInput.value.trim());
                    newInput.value = '';
                    e.preventDefault();
                }
            });
        }

        function updatePreview() {
            const code = document.getElementById('snippetCode').value;
            const language = document.getElementById('snippetLanguage').value;
            const preview = document.getElementById('codePreview');

            preview.textContent = code || '// Your code preview will appear here';
            preview.className = `hljs language-${language}`;
            hljs.highlightElement(preview);
        }

        function markUnsaved() {
            // Could add visual indicator here
        }

        function exportSnippets() {
            const data = JSON.stringify(snippets, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `code-snippets-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Snippets exported!');
        }

        function importSnippets(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    if (Array.isArray(imported)) {
                        snippets = [...imported, ...snippets];
                        saveToStorage();
                        renderSnippetList();
                        updateFilters();
                        showToast(`Imported ${imported.length} snippets!`);
                    }
                } catch (err) {
                    showToast('Invalid file format', true);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function showModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function hideModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
