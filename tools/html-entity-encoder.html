<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entity Encoder/Decoder - Dev Toolbox</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .converter-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .converter-container {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .panel-header h3 {
            margin: 0;
            color: var(--text-primary);
        }
        textarea {
            width: 100%;
            height: 200px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            color: var(--text-primary);
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-secondary {
            background: var(--secondary-bg);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--border-color);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .options-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-group label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .option-group select {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .quick-btn {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.1);
        }
        .quick-btn .entity {
            font-family: monospace;
            font-size: 14px;
            color: var(--primary-color);
        }
        .quick-btn .char {
            font-size: 20px;
        }
        .entity-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        .entity-table th, .entity-table td {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            text-align: left;
        }
        .entity-table th {
            background: var(--secondary-bg);
            font-weight: 600;
        }
        .stats {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="tool-container">
        <header class="tool-header">
            <h1>🔤 HTML Entity Encoder/Decoder</h1>
            <p class="tool-description">Encode and decode HTML entities - convert special characters to entity codes and back</p>
        </header>

        <div class="options-panel">
            <div class="option-group">
                <label for="encodeMode">Encode Mode:</label>
                <select id="encodeMode">
                    <option value="named">Named Entities (&amp;)</option>
                    <option value="decimal">Decimal (&amp;#38;)</option>
                    <option value="hex">Hexadecimal (&amp;#x26;)</option>
                </select>
            </div>
            <div class="option-group">
                <input type="checkbox" id="encodeAll" checked>
                <label for="encodeAll">Encode all special characters</label>
            </div>
        </div>

        <div class="converter-container">
            <div class="panel">
                <div class="panel-header">
                    <h3>Input (Plain Text)</h3>
                    <button class="btn btn-secondary" onclick="loadSample()">📝 Sample</button>
                </div>
                <textarea id="inputText" placeholder="Enter text to encode or decode..."></textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="encode()">⬆️ Encode to Entities</button>
                    <button class="btn btn-secondary" onclick="clearInput()">🗑️ Clear</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3>Output (HTML Entities)</h3>
                    <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy</button>
                </div>
                <textarea id="outputText" readonly placeholder="Encoded/decoded result will appear here..."></textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="decode()">⬇️ Decode to Text</button>
                </div>
            </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h3>📚 Common HTML Entities</h3>
            <div class="quick-actions" id="quickActions"></div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h3>📋 Entity Reference Table</h3>
            <div style="max-height: 300px; overflow: auto;">
                <table class="entity-table">
                    <thead>
                        <tr>
                            <th>Character</th>
                            <th>Named</th>
                            <th>Decimal</th>
                            <th>Hex</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody id="entityTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const namedEntities = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&apos;',
            ' ': '&nbsp;',
            '¡': '&iexcl;',
            '¢': '&cent;',
            '£': '&pound;',
            '¤': '&curren;',
            '¥': '&yen;',
            '¦': '&brvbar;',
            '§': '&sect;',
            '¨': '&uml;',
            '©': '&copy;',
            'ª': '&ordf;',
            '«': '&laquo;',
            '¬': '&not;',
            '®': '&reg;',
            '¯': '&macr;',
            '°': '&deg;',
            '±': '&plusmn;',
            '²': '&sup2;',
            '³': '&sup3;',
            '´': '&acute;',
            'µ': '&micro;',
            '¶': '&para;',
            '·': '&middot;',
            '¸': '&cedil;',
            '¹': '&sup1;',
            'º': '&ordm;',
            '»': '&raquo;',
            '¼': '&frac14;',
            '½': '&frac12;',
            '¾': '&frac34;',
            '¿': '&iquest;',
            '×': '&times;',
            '÷': '&divide;',
            '€': '&euro;',
            '£': '&pound;',
            '¥': '&yen;',
            '¢': '&cent;',
            '←': '&larr;',
            '↑': '&uarr;',
            '→': '&rarr;',
            '↓': '&darr;',
            '↔': '&harr;',
            '⇐': '&lArr;',
            '⇑': '&uArr;',
            '⇒': '&rArr;',
            '⇓': '&dArr;',
            '⇔': '&hArr;',
            '♠': '&spades;',
            '♣': '&clubs;',
            '♥': '&hearts;',
            '♦': '&diams;',
            'α': '&alpha;',
            'β': '&beta;',
            'γ': '&gamma;',
            'δ': '&delta;',
            'ε': '&epsilon;',
            'π': '&pi;',
            'σ': '&sigma;',
            'ω': '&omega;',
            '∑': '&sum;',
            '∏': '&prod;',
            '√': '&radic;',
            '∞': '&infin;',
            '∫': '&int;',
            '≈': '&asymp;',
            '≠': '&ne;',
            '≤': '&le;',
            '≥': '&ge;',
            '±': '&plusmn;',
            '÷': '&divide;',
            '×': '&times;',
            '•': '&bull;',
            '…': '&hellip;',
            '′': '&prime;',
            '″': '&Prime;',
            '‹': '&lsaquo;',
            '›': '&rsaquo;',
            '«': '&laquo;',
            '»': '&raquo;',
            '™': '&trade;',
            '©': '&copy;',
            '®': '&reg;',
            '§': '&sect;',
            '¶': '&para;',
            '†': '&dagger;',
            '‡': '&Dagger;'
        };

        const commonEntities = [
            { char: '&', name: 'amp', desc: 'Ampersand' },
            { char: '<', name: 'lt', desc: 'Less than' },
            { char: '>', name: 'gt', desc: 'Greater than' },
            { char: '"', name: 'quot', desc: 'Double quote' },
            { char: "'", name: 'apos', desc: 'Single quote' },
            { char: ' ', name: 'nbsp', desc: 'Non-breaking space' },
            { char: '©', name: 'copy', desc: 'Copyright' },
            { char: '®', name: 'reg', desc: 'Registered' },
            { char: '™', name: 'trade', desc: 'Trademark' },
            { char: '€', name: 'euro', desc: 'Euro' },
            { char: '£', name: 'pound', desc: 'Pound' },
            { char: '¥', name: 'yen', desc: 'Yen' }
        ];

        // Initialize quick actions
        function initQuickActions() {
            const container = document.getElementById('quickActions');
            commonEntities.forEach(entity => {
                const btn = document.createElement('div');
                btn.className = 'quick-btn';
                btn.innerHTML = `
                    <div class="char">${entity.char}</div>
                    <div class="entity">&amp;${entity.name};</div>
                `;
                btn.onclick = () => insertEntity(entity.name);
                container.appendChild(btn);
            });
        }

        // Initialize entity table
        function initEntityTable() {
            const tbody = document.getElementById('entityTable');
            commonEntities.forEach(entity => {
                const code = entity.char.charCodeAt(0);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-size: 18px;">${entity.char}</td>
                    <td><code>&amp;${entity.name};</code></td>
                    <td><code>&amp;#${code};</code></td>
                    <td><code>&amp;#x${code.toString(16)};</code></td>
                    <td>${entity.desc}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function insertEntity(name) {
            const input = document.getElementById('inputText');
            input.value += `&${name};`;
            input.focus();
        }

        function encode() {
            const input = document.getElementById('inputText').value;
            const mode = document.getElementById('encodeMode').value;
            const encodeAll = document.getElementById('encodeAll').checked;

            let output = '';

            for (let i = 0; i < input.length; i++) {
                const char = input[i];
                const code = input.charCodeAt(i);

                // Check if it's a named entity
                if (mode === 'named' && namedEntities[char]) {
                    output += namedEntities[char];
                } else if (encodeAll && (code > 127 || (code < 32 && code !== 10 && code !== 13))) {
                    // Encode non-ASCII and control characters
                    if (mode === 'hex') {
                        output += `&#x${code.toString(16)};`;
                    } else {
                        output += `&#${code};`;
                    }
                } else if (!encodeAll && namedEntities[char]) {
                    output += namedEntities[char];
                } else {
                    output += char;
                }
            }

            document.getElementById('outputText').value = output;
        }

        function decode() {
            let input = document.getElementById('outputText').value || document.getElementById('inputText').value;

            // Create a temporary element to decode entities
            const textarea = document.createElement('textarea');
            textarea.innerHTML = input;
            const decoded = textarea.value;

            document.getElementById('outputText').value = decoded;
        }

        function loadSample() {
            document.getElementById('inputText').value = `<div class="example">
    <p>Hello "World" & welcome!</p>
    <p>Price: €99.99 | £79.99 | ¥12,000</p>
    <p>© 2024 Company™</p>
    <p>Math: 5 × 3 = 15, 15 ÷ 3 = 5</p>
</div>`;
        }

        function clearInput() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
        }

        function copyOutput() {
            const output = document.getElementById('outputText').value;
            if (!output) {
                alert('Nothing to copy!');
                return;
            }
            navigator.clipboard.writeText(output).then(() => {
                alert('Copied to clipboard!');
            });
        }

        // Auto-encode on input
        document.getElementById('inputText').addEventListener('input', () => {
            if (document.getElementById('inputText').value) {
                encode();
            }
        });

        // Initialize
        initQuickActions();
        initEntityTable();
    </script>
</body>
</html>
