<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Visualizer - Interactive JSON Tree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 1.1rem;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .tree-container {
            height: 400px;
            overflow: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
        }

        .json-tree {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .tree-item {
            margin-left: 20px;
        }

        .tree-item.collapsed > .tree-children {
            display: none;
        }

        .tree-key {
            color: #00d4ff;
            cursor: pointer;
        }

        .tree-key:hover {
            text-decoration: underline;
        }

        .tree-string {
            color: #98c379;
        }

        .tree-number {
            color: #d19a66;
        }

        .tree-boolean {
            color: #c678dd;
        }

        .tree-null {
            color: #e06c75;
        }

        .tree-bracket {
            color: #abb2bf;
            cursor: pointer;
            user-select: none;
        }

        .tree-bracket:hover {
            color: #00d4ff;
        }

        .tree-toggle {
            display: inline-block;
            width: 16px;
            cursor: pointer;
            user-select: none;
            color: #888;
            font-size: 10px;
        }

        .tree-toggle:hover {
            color: #00d4ff;
        }

        .tree-preview {
            color: #888;
            font-style: italic;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 212, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .stat-item span {
            color: #00d4ff;
            font-weight: 600;
        }

        .path-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #7c3aed;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        .examples {
            margin-top: 15px;
        }

        .examples-title {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }

        .example-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .example-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .example-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .highlight {
            background: rgba(255, 200, 0, 0.3);
            border-radius: 2px;
        }

        .error-msg {
            color: #e06c75;
            background: rgba(224, 108, 117, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .view-options {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .view-btn {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .view-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-project-diagram"></i> JSON Visualizer</h1>
            <p class="subtitle">Interactive JSON tree visualization with search and path tracking</p>
        </header>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <i class="fas fa-code"></i> JSON Input
                    </div>
                    <div class="controls">
                        <button onclick="formatJSON()">
                            <i class="fas fa-magic"></i> Format
                        </button>
                        <button onclick="minifyJSON()" class="secondary">
                            <i class="fas fa-compress"></i> Minify
                        </button>
                        <button onclick="clearAll()" class="secondary">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                    </div>
                </div>

                <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>

                <div class="examples">
                    <div class="examples-title">Quick Examples:</div>
                    <div class="example-buttons">
                        <button class="example-btn" onclick="loadExample('user')">User Object</button>
                        <button class="example-btn" onclick="loadExample('array')">Array</button>
                        <button class="example-btn" onclick="loadExample('nested')">Nested</button>
                        <button class="example-btn" onclick="loadExample('api')">API Response</button>
                    </div>
                </div>

                <div id="errorMsg" class="error-msg" style="display: none;"></div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <i class="fas fa-sitemap"></i> Tree View
                    </div>
                    <div class="view-options">
                        <button class="view-btn active" onclick="expandAll()">
                            <i class="fas fa-expand-alt"></i> Expand
                        </button>
                        <button class="view-btn" onclick="collapseAll()">
                            <i class="fas fa-compress-alt"></i> Collapse
                        </button>
                    </div>
                </div>

                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search keys or values..." oninput="searchTree()">
                </div>

                <div class="tree-container" id="treeContainer">
                    <div class="json-tree" id="jsonTree">
                        <span style="color: #888;">Enter or paste JSON to visualize...</span>
                    </div>
                </div>

                <div class="path-display" id="pathDisplay">
                    <span style="color: #888;">Hover over a node to see its path</span>
                </div>

                <div class="stats" id="stats"></div>
            </div>
        </div>

        <footer>
            <p>JSON Visualizer - Interactive JSON visualization tool</p>
        </footer>
    </div>

    <script>
        const examples = {
            user: {
                "id": 12345,
                "name": "John Doe",
                "email": "john@example.com",
                "active": true,
                "roles": ["admin", "user"],
                "profile": {
                    "age": 30,
                    "location": "New York",
                    "interests": ["coding", "music"]
                },
                "lastLogin": null
            },
            array: [
                {"id": 1, "name": "Item 1", "price": 9.99},
                {"id": 2, "name": "Item 2", "price": 19.99},
                {"id": 3, "name": "Item 3", "price": 29.99}
            ],
            nested: {
                "company": {
                    "name": "Tech Corp",
                    "departments": {
                        "engineering": {
                            "head": "Alice",
                            "employees": [
                                {"name": "Bob", "role": "Senior Dev"},
                                {"name": "Charlie", "role": "Junior Dev"}
                            ]
                        },
                        "marketing": {
                            "head": "Diana",
                            "budget": 50000
                        }
                    }
                }
            },
            api: {
                "status": "success",
                "data": {
                    "users": [
                        {"id": 1, "name": "User 1"},
                        {"id": 2, "name": "User 2"}
                    ],
                    "pagination": {
                        "page": 1,
                        "perPage": 10,
                        "total": 100
                    }
                },
                "meta": {
                    "timestamp": "2026-03-06T12:00:00Z",
                    "version": "1.0"
                }
            }
        };

        let currentData = null;

        document.getElementById('jsonInput').addEventListener('input', debounce(visualize, 300));

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function visualize() {
            const input = document.getElementById('jsonInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const jsonTree = document.getElementById('jsonTree');

            if (!input) {
                jsonTree.innerHTML = '<span style="color: #888;">Enter or paste JSON to visualize...</span>';
                document.getElementById('stats').innerHTML = '';
                errorMsg.style.display = 'none';
                currentData = null;
                return;
            }

            try {
                currentData = JSON.parse(input);
                errorMsg.style.display = 'none';
                renderTree(currentData);
                updateStats(currentData);
            } catch (e) {
                errorMsg.textContent = `Invalid JSON: ${e.message}`;
                errorMsg.style.display = 'block';
                jsonTree.innerHTML = '<span style="color: #e06c75;">Invalid JSON - please check your syntax</span>';
            }
        }

        function renderTree(data, path = '') {
            const container = document.getElementById('jsonTree');
            container.innerHTML = renderNode(data, path, true);
        }

        function renderNode(data, path = '', isRoot = false) {
            if (data === null) {
                return `<span class="tree-null">null</span>`;
            }

            const type = typeof data;

            if (type === 'string') {
                const escaped = data.replace(/"/g, '&quot;');
                return `<span class="tree-string">"${escaped}"</span>`;
            }

            if (type === 'number') {
                return `<span class="tree-number">${data}</span>`;
            }

            if (type === 'boolean') {
                return `<span class="tree-boolean">${data}</span>`;
            }

            if (Array.isArray(data)) {
                if (data.length === 0) {
                    return '<span class="tree-bracket">[]</span>';
                }

                const items = data.map((item, index) => {
                    const itemPath = path ? `${path}[${index}]` : `[${index}]`;
                    return `<div class="tree-item">
                        <span class="tree-toggle" onclick="toggleNode(this)">▼</span>
                        <span class="tree-key" onmouseover="showPath('${itemPath}')">${index}:</span>
                        ${renderNode(item, itemPath)}
                    </div>`;
                }).join('');

                return `<span class="tree-bracket" onclick="toggleNode(this)">[</span>
                    <span class="tree-preview"> ${data.length} items </span>
                    <div class="tree-children">${items}</div>
                    <span class="tree-bracket">]</span>`;
            }

            if (type === 'object') {
                const keys = Object.keys(data);
                if (keys.length === 0) {
                    return '<span class="tree-bracket">{}</span>';
                }

                const items = keys.map(key => {
                    const escapedKey = key.replace(/"/g, '&quot;');
                    const itemPath = path ? `${path}.${key}` : key;
                    return `<div class="tree-item">
                        <span class="tree-toggle" onclick="toggleNode(this)">▼</span>
                        <span class="tree-key" onmouseover="showPath('${itemPath}')">"${escapedKey}":</span>
                        ${renderNode(data[key], itemPath)}
                    </div>`;
                }).join('');

                return `<span class="tree-bracket" onclick="toggleNode(this)">{</span>
                    <span class="tree-preview"> ${keys.length} keys </span>
                    <div class="tree-children">${items}</div>
                    <span class="tree-bracket">}</span>`;
            }

            return String(data);
        }

        function toggleNode(element) {
            const item = element.closest('.tree-item') || element.parentElement;
            if (item.classList.contains('tree-item')) {
                item.classList.toggle('collapsed');
                const toggle = item.querySelector('.tree-toggle');
                toggle.textContent = item.classList.contains('collapsed') ? '▶' : '▼';
            }
        }

        function expandAll() {
            document.querySelectorAll('.tree-item.collapsed').forEach(item => {
                item.classList.remove('collapsed');
                const toggle = item.querySelector('.tree-toggle');
                if (toggle) toggle.textContent = '▼';
            });
        }

        function collapseAll() {
            document.querySelectorAll('.tree-item').forEach(item => {
                item.classList.add('collapsed');
                const toggle = item.querySelector('.tree-toggle');
                if (toggle) toggle.textContent = '▶';
            });
        }

        function showPath(path) {
            document.getElementById('pathDisplay').innerHTML = `<i class="fas fa-crosshairs" style="margin-right: 8px;"></i>${path}`;
        }

        function updateStats(data) {
            const stats = countStats(data);
            document.getElementById('stats').innerHTML = `
                <div class="stat-item">Keys: <span>${stats.keys}</span></div>
                <div class="stat-item">Arrays: <span>${stats.arrays}</span></div>
                <div class="stat-item">Strings: <span>${stats.strings}</span></div>
                <div class="stat-item">Numbers: <span>${stats.numbers}</span></div>
                <div class="stat-item">Booleans: <span>${stats.booleans}</span></div>
                <div class="stat-item">Nulls: <span>${stats.nulls}</span></div>
                <div class="stat-item">Max Depth: <span>${stats.maxDepth}</span></div>
            `;
        }

        function countStats(data, depth = 0) {
            let stats = {
                keys: 0,
                arrays: 0,
                strings: 0,
                numbers: 0,
                booleans: 0,
                nulls: 0,
                maxDepth: depth
            };

            if (data === null) {
                stats.nulls = 1;
                return stats;
            }

            const type = typeof data;

            if (type === 'string') {
                stats.strings = 1;
                return stats;
            }

            if (type === 'number') {
                stats.numbers = 1;
                return stats;
            }

            if (type === 'boolean') {
                stats.booleans = 1;
                return stats;
            }

            if (Array.isArray(data)) {
                stats.arrays = 1;
                data.forEach(item => {
                    const childStats = countStats(item, depth + 1);
                    addStats(stats, childStats);
                });
                return stats;
            }

            if (type === 'object') {
                stats.keys = Object.keys(data).length;
                Object.values(data).forEach(value => {
                    const childStats = countStats(value, depth + 1);
                    addStats(stats, childStats);
                });
                return stats;
            }

            return stats;
        }

        function addStats(target, source) {
            target.keys += source.keys;
            target.arrays += source.arrays;
            target.strings += source.strings;
            target.numbers += source.numbers;
            target.booleans += source.booleans;
            target.nulls += source.nulls;
            target.maxDepth = Math.max(target.maxDepth, source.maxDepth);
        }

        function searchTree() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const treeItems = document.querySelectorAll('.tree-item');

            // Remove existing highlights
            document.querySelectorAll('.highlight').forEach(el => {
                el.classList.remove('highlight');
            });

            if (!query) return;

            treeItems.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(query)) {
                    // Expand parent items
                    let parent = item.parentElement;
                    while (parent) {
                        if (parent.classList.contains('tree-item')) {
                            parent.classList.remove('collapsed');
                            const toggle = parent.querySelector('.tree-toggle');
                            if (toggle) toggle.textContent = '▼';
                        }
                        parent = parent.parentElement;
                    }
                    item.querySelector('.tree-key')?.classList.add('highlight');
                }
            });
        }

        function formatJSON() {
            const input = document.getElementById('jsonInput');
            try {
                const parsed = JSON.parse(input.value);
                input.value = JSON.stringify(parsed, null, 2);
                visualize();
            } catch (e) {
                document.getElementById('errorMsg').textContent = `Cannot format: ${e.message}`;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function minifyJSON() {
            const input = document.getElementById('jsonInput');
            try {
                const parsed = JSON.parse(input.value);
                input.value = JSON.stringify(parsed);
                visualize();
            } catch (e) {
                document.getElementById('errorMsg').textContent = `Cannot minify: ${e.message}`;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function clearAll() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('jsonTree').innerHTML = '<span style="color: #888;">Enter or paste JSON to visualize...</span>';
            document.getElementById('stats').innerHTML = '';
            document.getElementById('pathDisplay').innerHTML = '<span style="color: #888;">Hover over a node to see its path</span>';
            document.getElementById('errorMsg').style.display = 'none';
            currentData = null;
        }

        function loadExample(name) {
            document.getElementById('jsonInput').value = JSON.stringify(examples[name], null, 2);
            visualize();
        }

        // Load a default example
        loadExample('api');
    </script>
</body>
</html>
