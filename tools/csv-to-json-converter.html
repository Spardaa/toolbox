<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to JSON Converter - Dev Toolbox</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .converter-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .converter-container {
                grid-template-columns: 1fr;
            }
        }
        .input-panel, .output-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .panel-header h3 {
            margin: 0;
            color: var(--text-primary);
        }
        textarea {
            width: 100%;
            height: 300px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            color: var(--text-primary);
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .options-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-group label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .option-group select, .option-group input {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-secondary {
            background: var(--secondary-bg);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--border-color);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .file-upload {
            display: none;
        }
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 15px;
        }
        .upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.05);
        }
        .upload-area.dragover {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.1);
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        .preview-table th, .preview-table td {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            text-align: left;
        }
        .preview-table th {
            background: var(--secondary-bg);
            font-weight: 600;
        }
        .preview-container {
            max-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="tool-container">
        <header class="tool-header">
            <h1>📄 CSV to JSON Converter</h1>
            <p class="tool-description">Convert CSV data to JSON format with customizable options</p>
        </header>

        <div class="options-panel">
            <div class="option-group">
                <label for="delimiter">Delimiter:</label>
                <select id="delimiter">
                    <option value=",">Comma (,)</option>
                    <option value=";">Semicolon (;)</option>
                    <option value="\t">Tab</option>
                    <option value="|">Pipe (|)</option>
                </select>
            </div>
            <div class="option-group">
                <input type="checkbox" id="headerRow" checked>
                <label for="headerRow">First row is header</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="parseNumbers" checked>
                <label for="parseNumbers">Parse numbers</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="trimValues" checked>
                <label for="trimValues">Trim values</label>
            </div>
            <div class="option-group">
                <label for="outputFormat">Output:</label>
                <select id="outputFormat">
                    <option value="array">Array of Objects</option>
                    <option value="object">Object (keyed by column)</option>
                    <option value="columns">Column Arrays</option>
                </select>
            </div>
        </div>

        <input type="file" id="fileUpload" class="file-upload" accept=".csv,.txt">
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div>Drop CSV file here or <strong>click to upload</strong></div>
            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 5px;">Supports .csv and .txt files</div>
        </div>

        <div class="converter-container">
            <div class="input-panel">
                <div class="panel-header">
                    <h3>CSV Input</h3>
                    <button class="btn btn-secondary" onclick="loadSample()">Load Sample</button>
                </div>
                <textarea id="csvInput" placeholder="name,age,email,city
John Doe,30,john@example.com,New York
Jane Smith,25,jane@example.com,Los Angeles
Bob Wilson,35,bob@example.com,Chicago"></textarea>
                <div class="stats">
                    <span>Rows: <strong id="rowCount">0</strong></span>
                    <span>Columns: <strong id="colCount">0</strong></span>
                </div>
            </div>

            <div class="output-panel">
                <div class="panel-header">
                    <h3>JSON Output</h3>
                    <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy</button>
                </div>
                <textarea id="jsonOutput" readonly placeholder="JSON output will appear here..."></textarea>
                <div class="stats">
                    <span>Objects: <strong id="objectCount">0</strong></span>
                    <span>Size: <strong id="jsonSize">0 B</strong></span>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="convert()">⬇️ Convert to JSON</button>
            <button class="btn btn-secondary" onclick="downloadJSON()">💾 Download JSON</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>

        <div id="previewSection" style="margin-top: 20px; display: none;">
            <h3 style="margin-bottom: 10px;">📊 Data Preview</h3>
            <div class="preview-container" id="previewContainer"></div>
        </div>
    </div>

    <script>
        const csvInput = document.getElementById('csvInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const delimiterSelect = document.getElementById('delimiter');
        const headerRowCheck = document.getElementById('headerRow');
        const parseNumbersCheck = document.getElementById('parseNumbers');
        const trimValuesCheck = document.getElementById('trimValues');
        const outputFormatSelect = document.getElementById('outputFormat');
        const fileUpload = document.getElementById('fileUpload');
        const uploadArea = document.getElementById('uploadArea');

        // File upload handling
        uploadArea.addEventListener('click', () => fileUpload.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        fileUpload.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                csvInput.value = e.target.result;
                updateStats();
                autoConvert();
            };
            reader.readAsText(file);
        }

        // Auto-convert on input change
        csvInput.addEventListener('input', () => {
            updateStats();
            autoConvert();
        });

        [delimiterSelect, headerRowCheck, parseNumbersCheck, trimValuesCheck, outputFormatSelect].forEach(el => {
            el.addEventListener('change', autoConvert);
        });

        function autoConvert() {
            if (csvInput.value.trim()) {
                convert();
            }
        }

        function updateStats() {
            const lines = csvInput.value.split('\n').filter(l => l.trim());
            document.getElementById('rowCount').textContent = lines.length;
            if (lines.length > 0) {
                const delimiter = delimiterSelect.value === '\\t' ? '\t' : delimiterSelect.value;
                const cols = parseCSVLine(lines[0], delimiter).length;
                document.getElementById('colCount').textContent = cols;
            }
        }

        function parseCSVLine(line, delimiter) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === delimiter && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function convert() {
            const csv = csvInput.value.trim();
            if (!csv) {
                jsonOutput.value = '';
                updateOutputStats(0);
                return;
            }

            const delimiter = delimiterSelect.value === '\\t' ? '\t' : delimiterSelect.value;
            const lines = csv.split('\n').filter(l => l.trim());
            const headerRow = headerRowCheck.checked;
            const parseNumbers = parseNumbersCheck.checked;
            const trimValues = trimValuesCheck.checked;
            const outputFormat = outputFormatSelect.value;

            let headers = [];
            let dataStartIndex = 0;

            if (headerRow && lines.length > 0) {
                headers = parseCSVLine(lines[0], delimiter).map(h => {
                    let header = trimValues ? h.trim() : h;
                    // Remove surrounding quotes
                    if (header.startsWith('"') && header.endsWith('"')) {
                        header = header.slice(1, -1);
                    }
                    return header;
                });
                dataStartIndex = 1;
            }

            const rows = [];
            for (let i = dataStartIndex; i < lines.length; i++) {
                const values = parseCSVLine(lines[i], delimiter);
                const row = {};

                values.forEach((value, index) => {
                    let val = trimValues ? value.trim() : value;
                    // Remove surrounding quotes
                    if (val.startsWith('"') && val.endsWith('"')) {
                        val = val.slice(1, -1);
                    }
                    // Parse numbers
                    if (parseNumbers && !isNaN(val) && val !== '') {
                        val = parseFloat(val);
                    }
                    // Parse booleans
                    if (val === 'true') val = true;
                    if (val === 'false') val = false;

                    const key = headerRow ? (headers[index] || `column_${index}`) : `column_${index}`;
                    row[key] = val;
                });

                rows.push(row);
            }

            let result;
            switch (outputFormat) {
                case 'object':
                    result = {};
                    rows.forEach((row, index) => {
                        result[index] = row;
                    });
                    break;
                case 'columns':
                    result = {};
                    if (headerRow) {
                        headers.forEach(header => {
                            result[header] = rows.map(row => row[header]);
                        });
                    } else {
                        const maxCols = Math.max(...rows.map(r => Object.keys(r).length));
                        for (let i = 0; i < maxCols; i++) {
                            result[`column_${i}`] = rows.map(row => row[`column_${i}`]);
                        }
                    }
                    break;
                default:
                    result = rows;
            }

            const json = JSON.stringify(result, null, 2);
            jsonOutput.value = json;
            updateOutputStats(rows.length);

            // Show preview
            showPreview(rows, headers);
        }

        function updateOutputStats(count) {
            document.getElementById('objectCount').textContent = count;
            const size = new Blob([jsonOutput.value]).size;
            document.getElementById('jsonSize').textContent = formatBytes(size);
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showPreview(rows, headers) {
            const previewSection = document.getElementById('previewSection');
            const previewContainer = document.getElementById('previewContainer');

            if (rows.length === 0) {
                previewSection.style.display = 'none';
                return;
            }

            previewSection.style.display = 'block';
            const displayRows = rows.slice(0, 5);

            let html = '<table class="preview-table"><thead><tr>';
            headers.forEach(h => {
                html += `<th>${escapeHtml(h)}</th>`;
            });
            html += '</tr></thead><tbody>';

            displayRows.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    html += `<td>${escapeHtml(String(row[h] || ''))}</td>`;
                });
                html += '</tr>';
            });

            if (rows.length > 5) {
                html += `<tr><td colspan="${headers.length}" style="text-align: center; color: var(--text-secondary);">... and ${rows.length - 5} more rows</td></tr>`;
            }

            html += '</tbody></table>';
            previewContainer.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadSample() {
            csvInput.value = `name,age,email,city,active
John Doe,30,john@example.com,New York,true
Jane Smith,25,jane@example.com,Los Angeles,true
Bob Wilson,35,bob@example.com,Chicago,false
Alice Brown,28,alice@example.com,Boston,true
Charlie Davis,42,charlie@example.com,Seattle,true`;
            updateStats();
            convert();
        }

        function copyOutput() {
            navigator.clipboard.writeText(jsonOutput.value).then(() => {
                alert('JSON copied to clipboard!');
            });
        }

        function downloadJSON() {
            if (!jsonOutput.value) {
                alert('No JSON to download!');
                return;
            }
            const blob = new Blob([jsonOutput.value], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            csvInput.value = '';
            jsonOutput.value = '';
            document.getElementById('rowCount').textContent = '0';
            document.getElementById('colCount').textContent = '0';
            document.getElementById('objectCount').textContent = '0';
            document.getElementById('jsonSize').textContent = '0 B';
            document.getElementById('previewSection').style.display = 'none';
        }

        // Initialize
        updateStats();
    </script>
</body>
</html>
