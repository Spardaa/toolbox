<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Mock - Developer Toolbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
        }

        h1 span {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .endpoint-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: calc(100vh - 300px);
            overflow-y: auto;
        }

        .endpoint-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .endpoint-item:hover {
            background: var(--border);
        }

        .endpoint-item.active {
            background: var(--accent);
        }

        .method-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .method-get { background: var(--success); color: white; }
        .method-post { background: #8b5cf6; color: white; }
        .method-put { background: #f59e0b; color: white; }
        .method-patch { background: #ec4899; color: white; }
        .method-delete { background: var(--error); color: white; }

        .endpoint-path {
            flex: 1;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .endpoint-actions {
            display: flex;
            gap: 5px;
        }

        .editor-panel {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 10px;
        }

        select, input, textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            min-height: 200px;
            resize: vertical;
        }

        .response-config {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 6px 6px 0 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
        }

        .tab.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .headers-editor {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 15px;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
        }

        .add-header-btn {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .add-header-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .test-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .test-url {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .test-url input {
            flex: 1;
        }

        .response-display {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 15px;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-code {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-2xx { background: var(--success); color: white; }
        .status-4xx { background: var(--warning); color: white; }
        .status-5xx { background: var(--error); color: white; }

        .response-time {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .response-body {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .import-export {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .import-export.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 25px;
            width: 500px;
            max-width: 90%;
        }

        .modal h3 {
            margin-bottom: 15px;
        }

        .modal textarea {
            min-height: 200px;
            margin-bottom: 15px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--success);
            color: white;
            border-radius: 6px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1001;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: 2;
            }

            .endpoint-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>REST</span> API Mock</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="showImportExport('import')">Import</button>
                <button class="btn btn-secondary" onclick="showImportExport('export')">Export</button>
                <button class="btn btn-secondary" onclick="copyShareUrl()">Share URL</button>
                <button class="btn btn-primary" onclick="createNewEndpoint()">+ New Endpoint</button>
            </div>
        </header>

        <div class="main-layout">
            <div class="sidebar">
                <h2>Mock Endpoints</h2>
                <div class="endpoint-list" id="endpointList">
                    <!-- Endpoints will be rendered here -->
                </div>
            </div>

            <div class="editor-panel" id="editorPanel">
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <h3>No endpoint selected</h3>
                    <p>Create a new mock endpoint to get started</p>
                </div>

                <div id="editorContent" style="display: none;">
                    <div class="form-group">
                        <div class="form-row">
                            <div>
                                <label>Method</label>
                                <select id="method" onchange="markDirty()">
                                    <option value="GET">GET</option>
                                    <option value="POST">POST</option>
                                    <option value="PUT">PUT</option>
                                    <option value="PATCH">PATCH</option>
                                    <option value="DELETE">DELETE</option>
                                </select>
                            </div>
                            <div>
                                <label>Path</label>
                                <input type="text" id="path" placeholder="/api/users" oninput="markDirty()">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="description" placeholder="Optional description" oninput="markDirty()">
                    </div>

                    <div class="response-config">
                        <div>
                            <label>Status Code</label>
                            <select id="statusCode" onchange="markDirty()">
                                <option value="200">200 OK</option>
                                <option value="201">201 Created</option>
                                <option value="204">204 No Content</option>
                                <option value="400">400 Bad Request</option>
                                <option value="401">401 Unauthorized</option>
                                <option value="403">403 Forbidden</option>
                                <option value="404">404 Not Found</option>
                                <option value="500">500 Server Error</option>
                            </select>
                        </div>
                        <div>
                            <label>Delay (ms)</label>
                            <input type="number" id="delay" value="0" min="0" max="10000" oninput="markDirty()">
                        </div>
                    </div>

                    <div class="tabs">
                        <button class="tab active" onclick="switchTab('body')">Response Body</button>
                        <button class="tab" onclick="switchTab('headers')">Headers</button>
                    </div>

                    <div class="tab-content active" id="bodyTab">
                        <div class="form-group">
                            <textarea id="responseBody" placeholder='{"message": "Hello World"}' oninput="markDirty()"></textarea>
                        </div>
                    </div>

                    <div class="tab-content" id="headersTab">
                        <div class="headers-editor" id="headersEditor">
                            <div id="headersList"></div>
                            <button class="add-header-btn" onclick="addHeader()">+ Add Header</button>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <button class="btn btn-success" onclick="saveEndpoint()">Save Endpoint</button>
                        <button class="btn btn-danger" style="margin-left: 10px;" onclick="deleteEndpoint()">Delete</button>
                    </div>

                    <div class="test-section">
                        <h3 style="margin-bottom: 15px;">Test Mock</h3>
                        <div class="test-url">
                            <input type="text" id="testUrl" readonly>
                            <button class="btn btn-primary" onclick="testMock()">Test</button>
                        </div>
                        <div class="response-display" id="responseDisplay" style="display: none;">
                            <div class="response-header">
                                <span class="status-code" id="responseStatus"></span>
                                <span class="response-time" id="responseTime"></span>
                            </div>
                            <div class="response-body" id="responseOutput"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="import-export" id="importExportModal">
        <div class="modal">
            <h3 id="modalTitle">Import Endpoints</h3>
            <textarea id="importExportData" placeholder='Paste JSON here...'></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeImportExport()">Cancel</button>
                <button class="btn btn-primary" id="modalAction" onclick="doImport()">Import</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // State
        let endpoints = [];
        let activeEndpointId = null;
        let isDirty = false;
        let currentModalMode = 'import';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            loadFromUrl();
            renderEndpoints();
        });

        // Storage
        function loadFromStorage() {
            const stored = localStorage.getItem('restApiMocks');
            if (stored) {
                try {
                    endpoints = JSON.parse(stored);
                } catch (e) {
                    endpoints = [];
                }
            }
        }

        function saveToStorage() {
            localStorage.setItem('restApiMocks', JSON.stringify(endpoints));
        }

        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            if (data) {
                try {
                    const decoded = JSON.parse(atob(data));
                    if (Array.isArray(decoded)) {
                        endpoints = [...decoded, ...endpoints];
                        saveToStorage();
                        renderEndpoints();
                        showToast('Imported endpoints from URL');
                    }
                } catch (e) {
                    console.error('Failed to load from URL:', e);
                }
            }
        }

        // Render
        function renderEndpoints() {
            const list = document.getElementById('endpointList');

            if (endpoints.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: var(--text-secondary);">
                        <p>No endpoints yet</p>
                        <p style="font-size: 12px; margin-top: 5px;">Click "+ New Endpoint" to create one</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = endpoints.map(ep => `
                <div class="endpoint-item ${ep.id === activeEndpointId ? 'active' : ''}" onclick="selectEndpoint('${ep.id}')">
                    <span class="method-badge method-${ep.method.toLowerCase()}">${ep.method}</span>
                    <span class="endpoint-path">${ep.path}</span>
                    <div class="endpoint-actions">
                        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); duplicateEndpoint('${ep.id}')" title="Duplicate">
                            📋
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Endpoint CRUD
        function createNewEndpoint() {
            const newEndpoint = {
                id: 'ep_' + Date.now(),
                method: 'GET',
                path: '/api/resource',
                description: '',
                statusCode: 200,
                delay: 0,
                body: '{\n  "message": "Success"\n}',
                headers: [
                    { key: 'Content-Type', value: 'application/json' }
                ]
            };

            endpoints.unshift(newEndpoint);
            saveToStorage();
            selectEndpoint(newEndpoint.id);
            renderEndpoints();
        }

        function selectEndpoint(id) {
            if (isDirty) {
                if (!confirm('You have unsaved changes. Continue?')) {
                    return;
                }
            }

            activeEndpointId = id;
            const ep = endpoints.find(e => e.id === id);

            if (ep) {
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('editorContent').style.display = 'block';

                document.getElementById('method').value = ep.method;
                document.getElementById('path').value = ep.path;
                document.getElementById('description').value = ep.description || '';
                document.getElementById('statusCode').value = ep.statusCode;
                document.getElementById('delay').value = ep.delay;
                document.getElementById('responseBody').value = ep.body;

                renderHeaders(ep.headers || []);

                updateTestUrl();
            }

            isDirty = false;
            renderEndpoints();
        }

        function saveEndpoint() {
            const ep = endpoints.find(e => e.id === activeEndpointId);
            if (!ep) return;

            ep.method = document.getElementById('method').value;
            ep.path = document.getElementById('path').value;
            ep.description = document.getElementById('description').value;
            ep.statusCode = parseInt(document.getElementById('statusCode').value);
            ep.delay = parseInt(document.getElementById('delay').value) || 0;
            ep.body = document.getElementById('responseBody').value;
            ep.headers = getHeaders();

            saveToStorage();
            isDirty = false;
            renderEndpoints();
            showToast('Endpoint saved');
        }

        function deleteEndpoint() {
            if (!confirm('Delete this endpoint?')) return;

            endpoints = endpoints.filter(e => e.id !== activeEndpointId);
            activeEndpointId = null;
            saveToStorage();

            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('editorContent').style.display = 'none';

            renderEndpoints();
            showToast('Endpoint deleted');
        }

        function duplicateEndpoint(id) {
            const ep = endpoints.find(e => e.id === id);
            if (!ep) return;

            const duplicate = {
                ...ep,
                id: 'ep_' + Date.now(),
                path: ep.path + '-copy'
            };

            endpoints.unshift(duplicate);
            saveToStorage();
            renderEndpoints();
            showToast('Endpoint duplicated');
        }

        // Headers
        function renderHeaders(headers) {
            const list = document.getElementById('headersList');
            list.innerHTML = headers.map((h, i) => `
                <div class="header-row">
                    <input type="text" value="${h.key}" placeholder="Header name" onchange="updateHeader(${i}, 'key', this.value)">
                    <input type="text" value="${h.value}" placeholder="Header value" onchange="updateHeader(${i}, 'value', this.value)">
                    <button class="btn btn-sm btn-danger" onclick="removeHeader(${i})">✕</button>
                </div>
            `).join('');
        }

        function addHeader() {
            const ep = endpoints.find(e => e.id === activeEndpointId);
            if (!ep) return;

            if (!ep.headers) ep.headers = [];
            ep.headers.push({ key: '', value: '' });
            renderHeaders(ep.headers);
            markDirty();
        }

        function updateHeader(index, field, value) {
            const ep = endpoints.find(e => e.id === activeEndpointId);
            if (!ep || !ep.headers) return;

            ep.headers[index][field] = value;
            markDirty();
        }

        function removeHeader(index) {
            const ep = endpoints.find(e => e.id === activeEndpointId);
            if (!ep || !ep.headers) return;

            ep.headers.splice(index, 1);
            renderHeaders(ep.headers);
            markDirty();
        }

        function getHeaders() {
            const rows = document.querySelectorAll('#headersList .header-row');
            const headers = [];
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value) {
                    headers.push({
                        key: inputs[0].value,
                        value: inputs[1].value
                    });
                }
            });
            return headers;
        }

        // Tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // Test
        function updateTestUrl() {
            const ep = endpoints.find(e => e.id === activeEndpointId);
            if (ep) {
                document.getElementById('testUrl').value = `${window.location.origin}${ep.path}`;
            }
        }

        function testMock() {
            const ep = endpoints.find(e => e.id === activeEndpointId);
            if (!ep) return;

            const delay = ep.delay || 0;
            const startTime = Date.now();

            const display = document.getElementById('responseDisplay');
            const statusEl = document.getElementById('responseStatus');
            const timeEl = document.getElementById('responseTime');
            const outputEl = document.getElementById('responseOutput');

            display.style.display = 'block';
            outputEl.textContent = 'Loading...';

            setTimeout(() => {
                const elapsed = Date.now() - startTime;

                // Format response
                let formattedBody = ep.body;
                try {
                    formattedBody = JSON.stringify(JSON.parse(ep.body), null, 2);
                } catch (e) {
                    // Not valid JSON, use as-is
                }

                statusEl.textContent = `${ep.statusCode} ${getStatusText(ep.statusCode)}`;
                statusEl.className = 'status-code ' + getStatusClass(ep.statusCode);
                timeEl.textContent = `${elapsed}ms`;
                outputEl.textContent = formattedBody;
            }, delay);
        }

        function getStatusText(code) {
            const texts = {
                200: 'OK',
                201: 'Created',
                204: 'No Content',
                400: 'Bad Request',
                401: 'Unauthorized',
                403: 'Forbidden',
                404: 'Not Found',
                500: 'Server Error'
            };
            return texts[code] || 'Unknown';
        }

        function getStatusClass(code) {
            if (code >= 200 && code < 300) return 'status-2xx';
            if (code >= 400 && code < 500) return 'status-4xx';
            return 'status-5xx';
        }

        // Import/Export
        function showImportExport(mode) {
            currentModalMode = mode;
            const modal = document.getElementById('importExportModal');
            const title = document.getElementById('modalTitle');
            const actionBtn = document.getElementById('modalAction');
            const textarea = document.getElementById('importExportData');

            if (mode === 'import') {
                title.textContent = 'Import Endpoints';
                actionBtn.textContent = 'Import';
                actionBtn.onclick = doImport;
                textarea.value = '';
                textarea.placeholder = 'Paste JSON here...';
            } else {
                title.textContent = 'Export Endpoints';
                actionBtn.textContent = 'Copy to Clipboard';
                actionBtn.onclick = copyExport;
                textarea.value = JSON.stringify(endpoints, null, 2);
                textarea.placeholder = '';
            }

            modal.classList.add('active');
        }

        function closeImportExport() {
            document.getElementById('importExportModal').classList.remove('active');
        }

        function doImport() {
            const textarea = document.getElementById('importExportData');
            try {
                const imported = JSON.parse(textarea.value);
                if (Array.isArray(imported)) {
                    // Generate new IDs for imported endpoints
                    const newEndpoints = imported.map(ep => ({
                        ...ep,
                        id: 'ep_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
                    }));
                    endpoints = [...newEndpoints, ...endpoints];
                    saveToStorage();
                    renderEndpoints();
                    closeImportExport();
                    showToast(`Imported ${newEndpoints.length} endpoints`);
                } else {
                    alert('Invalid format: expected an array of endpoints');
                }
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }

        function copyExport() {
            const textarea = document.getElementById('importExportData');
            textarea.select();
            document.execCommand('copy');
            showToast('Copied to clipboard');
        }

        function copyShareUrl() {
            const data = btoa(JSON.stringify(endpoints));
            const url = `${window.location.origin}${window.location.pathname}?data=${data}`;

            navigator.clipboard.writeText(url).then(() => {
                showToast('Share URL copied to clipboard');
            }).catch(() => {
                prompt('Copy this URL:', url);
            });
        }

        // Utils
        function markDirty() {
            isDirty = true;
            updateTestUrl();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
