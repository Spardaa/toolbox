<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - 开发者工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; padding: 20px 0; color: #00d4ff; }
        
        .panel { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .panel h2 { margin-bottom: 15px; color: #00d4ff; font-size: 1.1rem; }
        
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .control-group label { display: block; margin-bottom: 5px; color: #888; font-size: 14px; }
        select, input[type="number"] { 
            width: 100%; background: #1a1a2e; border: 1px solid #333; 
            color: #eee; padding: 10px; border-radius: 6px;
        }
        
        .generate-btn { 
            width: 100%; padding: 15px; background: #00d4ff; color: #1a1a2e; 
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; 
            cursor: pointer; margin-top: 15px;
        }
        .generate-btn:hover { background: #00b8e6; }
        
        .output-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .output-box { background: #1a1a2e; border-radius: 8px; padding: 15px; }
        .output-box h3 { margin-bottom: 10px; color: #888; font-size: 14px; }
        .output-box textarea { 
            width: 100%; min-height: 300px; background: transparent; border: none; 
            color: #eee; font-size: 14px; resize: vertical; font-family: inherit;
        }
        .copy-btn { 
            margin-top: 10px; padding: 8px 15px; background: #27ae60; color: white; 
            border: none; border-radius: 6px; cursor: pointer;
        }
        
        .options { margin-top: 15px; }
        .option { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .option input[type="checkbox"] { width: 18px; height: 18px; }
        .option label { color: #888; cursor: pointer; }
        
        .stats { display: flex; gap: 20px; margin-top: 15px; padding: 10px; background: #1a1a2e; border-radius: 6px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Lorem Ipsum Generator</h1>
        
        <div class="panel">
            <h2>Settings</h2>
            <div class="controls">
                <div class="control-group">
                    <label>Type</label>
                    <select id="type">
                        <option value="paragraphs">Paragraphs</option>
                        <option value="sentences">Sentences</option>
                        <option value="words">Words</option>
                        <option value="list">List Items</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Amount</label>
                    <input type="number" id="amount" value="3" min="1" max="100">
                </div>
                <div class="control-group">
                    <label>Start with Lorem</label>
                    <select id="start-lorem">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>
            </div>
            
            <div class="options">
                <div class="option">
                    <input type="checkbox" id="include-html" checked>
                    <label for="include-html">Include HTML tags</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="chinese">
                    <label for="chinese">Chinese placeholder text (中文假文)</label>
                </div>
            </div>
            
            <button class="generate-btn" onclick="generate()">🎲 Generate</button>
        </div>
        
        <div class="output-section">
            <div class="output-box">
                <h3>Plain Text</h3>
                <textarea id="plain-output" readonly></textarea>
                <button class="copy-btn" onclick="copyPlain()">📋 Copy</button>
            </div>
            <div class="output-box">
                <h3>HTML</h3>
                <textarea id="html-output" readonly></textarea>
                <button class="copy-btn" onclick="copyHtml()">📋 Copy HTML</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="word-count">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="sentence-count">0</div>
                <div class="stat-label">Sentences</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="paragraph-count">0</div>
                <div class="stat-label">Paragraphs</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="char-count">0</div>
                <div class="stat-label">Characters</div>
            </div>
        </div>
    </div>
    
    <script>
        const loremWords = [
            'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
            'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
            'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
            'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo',
            'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate',
            'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint',
            'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia',
            'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum', 'perspiciatis', 'unde',
            'omnis', 'iste', 'natus', 'error', 'voluptatem', 'accusantium', 'doloremque',
            'laudantium', 'totam', 'rem', 'aperiam', 'eaque', 'ipsa', 'quae', 'ab', 'illo',
            'inventore', 'veritatis', 'quasi', 'architecto', 'beatae', 'vitae', 'dicta',
            'explicabo', 'nemo', 'ipsam', 'quia', 'voluptas', 'aspernatur', 'aut', 'odit',
            'fugit', 'consequuntur', 'magni', 'dolores', 'eos', 'ratione', 'sequi',
            'nesciunt', 'neque', 'porro', 'quisquam', 'dolorem', 'adipisci', 'numquam',
            'eius', 'modi', 'tempora', 'magnam', 'quaerat'
        ];
        
        const chineseText = [
            '春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。',
            '床前明月光，疑是地上霜。举头望明月，低头思故乡。',
            '白日依山尽，黄河入海流。欲穷千里目，更上一层楼。',
            '离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。',
            '空山不见人，但闻人语响。返景入深林，复照青苔上。',
            '千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。',
            '红豆生南国，春来发几枝。愿君多采撷，此物最相思。',
            '独坐幽篁里，弹琴复长啸。深林人不知，明月来相照。',
            '海上生明月，天涯共此时。情人怨遥夜，竟夕起相思。',
            '好雨知时节，当春乃发生。随风潜入夜，润物细无声。'
        ];
        
        function getRandomWord() {
            return loremWords[Math.floor(Math.random() * loremWords.length)];
        }
        
        function generateSentence(startWithLorem = false) {
            const length = 8 + Math.floor(Math.random() * 10);
            let words = [];
            
            if (startWithLorem) {
                words = ['Lorem', 'ipsum', 'dolor', 'sit', 'amet'];
            }
            
            while (words.length < length) {
                words.push(getRandomWord());
            }
            
            let sentence = words.join(' ');
            sentence = sentence.charAt(0).toUpperCase() + sentence.slice(1);
            sentence += '.';
            
            return sentence;
        }
        
        function generateParagraph(startWithLorem = false) {
            const sentenceCount = 4 + Math.floor(Math.random() * 4);
            let sentences = [];
            
            for (let i = 0; i < sentenceCount; i++) {
                sentences.push(generateSentence(i === 0 && startWithLorem));
            }
            
            return sentences.join(' ');
        }
        
        function generateChineseParagraph() {
            const count = 2 + Math.floor(Math.random() * 3);
            const sentences = [];
            for (let i = 0; i < count; i++) {
                sentences.push(chineseText[Math.floor(Math.random() * chineseText.length)]);
            }
            return sentences.join('');
        }
        
        function generate() {
            const type = document.getElementById('type').value;
            const amount = parseInt(document.getElementById('amount').value);
            const startLorem = document.getElementById('start-lorem').value === 'yes';
            const includeHtml = document.getElementById('include-html').checked;
            const isChinese = document.getElementById('chinese').checked;
            
            let plainText = '';
            let htmlText = '';
            
            if (isChinese) {
                if (type === 'paragraphs') {
                    const paragraphs = [];
                    for (let i = 0; i < amount; i++) {
                        paragraphs.push(generateChineseParagraph());
                    }
                    plainText = paragraphs.join('\n\n');
                    htmlText = includeHtml 
                        ? paragraphs.map(p => `<p>${p}</p>`).join('\n')
                        : plainText;
                } else if (type === 'sentences') {
                    const sentences = [];
                    for (let i = 0; i < amount; i++) {
                        sentences.push(chineseText[Math.floor(Math.random() * chineseText.length)]);
                    }
                    plainText = sentences.join('');
                    htmlText = `<p>${plainText}</p>`;
                } else if (type === 'list') {
                    const items = [];
                    for (let i = 0; i < amount; i++) {
                        items.push(chineseText[Math.floor(Math.random() * chineseText.length)]);
                    }
                    plainText = items.map(item => `• ${item}`).join('\n');
                    htmlText = includeHtml 
                        ? `<ul>\n${items.map(item => `  <li>${item}</li>`).join('\n')}\n</ul>`
                        : plainText;
                }
            } else {
                if (type === 'paragraphs') {
                    const paragraphs = [];
                    for (let i = 0; i < amount; i++) {
                        paragraphs.push(generateParagraph(i === 0 && startLorem));
                    }
                    plainText = paragraphs.join('\n\n');
                    htmlText = includeHtml 
                        ? paragraphs.map(p => `<p>${p}</p>`).join('\n')
                        : plainText;
                } else if (type === 'sentences') {
                    const sentences = [];
                    for (let i = 0; i < amount; i++) {
                        sentences.push(generateSentence(i === 0 && startLorem));
                    }
                    plainText = sentences.join(' ');
                    htmlText = `<p>${plainText}</p>`;
                } else if (type === 'words') {
                    const words = [];
                    for (let i = 0; i < amount; i++) {
                        words.push(getRandomWord());
                    }
                    if (startLorem && words.length > 0) {
                        words[0] = 'Lorem';
                        if (words.length > 1) words[1] = 'ipsum';
                    }
                    plainText = words.join(' ');
                    htmlText = `<p>${plainText}</p>`;
                } else if (type === 'list') {
                    const items = [];
                    for (let i = 0; i < amount; i++) {
                        items.push(generateSentence(i === 0 && startLorem));
                    }
                    plainText = items.map(item => `• ${item}`).join('\n');
                    htmlText = includeHtml 
                        ? `<ul>\n${items.map(item => `  <li>${item}</li>`).join('\n')}\n</ul>`
                        : plainText;
                }
            }
            
            document.getElementById('plain-output').value = plainText;
            document.getElementById('html-output').value = htmlText;
            
            updateStats(plainText);
        }
        
        function updateStats(text) {
            const words = text.split(/\s+/).filter(w => w.length > 0);
            const sentences = text.split(/[.!?。！？]+/).filter(s => s.trim().length > 0);
            const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 0);
            
            document.getElementById('word-count').textContent = words.length;
            document.getElementById('sentence-count').textContent = sentences.length;
            document.getElementById('paragraph-count').textContent = paragraphs.length;
            document.getElementById('char-count').textContent = text.length;
        }
        
        function copyPlain() {
            navigator.clipboard.writeText(document.getElementById('plain-output').value);
            alert('Copied!');
        }
        
        function copyHtml() {
            navigator.clipboard.writeText(document.getElementById('html-output').value);
            alert('Copied!');
        }
        
        // Generate on load
        generate();
    </script>
</body>
</html>
