<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Formatter - Format SQL Queries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e1;
            border: 1px solid #3a3a5a;
        }
        .btn-secondary:hover {
            background: #3a3a5a;
        }
        .dialect-select {
            display: flex;
            gap: 5px;
            background: #2a2a4a;
            border-radius: 8px;
            padding: 3px;
        }
        .dialect-select button {
            padding: 8px 12px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .dialect-select button.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
        }
        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 0.9rem;
        }
        .option select, .option input {
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            color: #e0e0e1;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .option input[type="number"] {
            width: 50px;
        }
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 15px 0;
        }
        @media (max-width: 900px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: #1e1e3a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #3a3a5a;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #2a2a4a;
            border-bottom: 1px solid #3a3a5a;
        }
        .panel-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .icon-btn:hover {
            background: #3a3a5a;
            color: #e0e0e1;
        }
        textarea {
            flex: 1;
            width: 100%;
            min-height: 350px;
            background: transparent;
            border: none;
            padding: 15px;
            color: #e0e0e1;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            resize: vertical;
            line-height: 1.6;
        }
        textarea:focus {
            outline: none;
        }
        textarea::placeholder {
            color: #555;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            background: #2a2a4a;
            font-size: 0.85rem;
            color: #888;
        }
        .status-bar span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .error-message {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .error-message.visible {
            display: block;
        }
        .examples {
            margin: 30px 0;
        }
        .examples h3 {
            margin-bottom: 15px;
            color: #888;
        }
        .example-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .example-btn {
            padding: 15px;
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
            color: #e0e0e1;
        }
        .example-btn:hover {
            background: #3a3a5a;
            border-color: #00d4ff;
        }
        .example-btn strong {
            display: block;
            margin-bottom: 5px;
        }
        .example-btn span {
            font-size: 0.85rem;
            color: #888;
        }
        /* Syntax Highlighting */
        .highlighted {
            padding: 15px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-x: auto;
            min-height: 350px;
        }
        .keyword { color: #ff79c6; }
        .function { color: #50fa7b; }
        .string{ color: #f1fa8c; }
        .number{ color: #bd93f9; }
        .comment{ color: #6272a4; font-style: italic; }
        .operator { color: #ff79c6; }
        .bracket { color: #f8f8f2; }
        footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-database"></i> SQL Formatter</h1>
            <p class="subtitle">Format and compress SQL queries with syntax highlighting</p>
        </header>

        <div class="controls">
            <button class="btn btn-primary" onclick="formatSQL()">
                <i class="fas fa-magic"></i> Format
            </button>
            <button class="btn btn-secondary" onclick="compress()">
                <i class="fas fa-compress-alt"></i> Compress
            </button>
            <div class="dialect-select">
                <button id="standardBtn" class="active" onclick="setDialect('standard')">Standard</button>
                <button id="mysqlBtn" onclick="setDialect('mysql')">MySQL</button>
                <button id="postgresBtn" onclick="setDialect('postgres')">PostgreSQL</button>
                <button id="sqliteBtn" onclick="setDialect('sqlite')">SQLite</button>
            </div>
        </div>

        <div class="options">
            <div class="option">
                <label>Indent Size</label>
                <select id="indentSize">
                    <option value="2" id="2spaces">2 spaces
                </select>
            </div>
            <div class="option">
                <label>Uppercase keywords</label>
                <input type="checkbox" id="uppercase" checked>
            </div>
            <div class="option">
                <label>Remove comments</label>
                <input type="checkbox" id="removeComments" checked>
            </div>
        </div>

        <div class="editor-container">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <i class="fas fa-pencil-alt"></i> Input SQL
                    </div>
                    <div class="panel-actions">
                        <button class="icon-btn" onclick="loadFile()" title="Load File">
                            <i class="fas fa-folder-open"></i>
                        </button>
                        <button class="icon-btn" onclick="pasteFromClipboard()" title="Paste">
                            <i class="fas fa-paste"></i>
                        </button>
                        <button class="icon-btn" onclick="clearEditor()" title="Clear">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                <textarea id="inputSQL" placeholder="Paste your SQL query here..."></textarea>
                <div class="status-bar">
                    <span id="inputStats"><i class="fas fa-font"></i> 0 characters</span>
                    <span id="inputLines"><i class="fas fa-align-left"></i> 0 lines</span>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <i class="fas fa-file-code"></i> FormattedSQL
                    </div>
                    <div class="panel-actions">
                        <button class="icon-btn" onclick="copyOutput()" title="Copy">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="icon-btn" onclick="downloadOutput()" title="Download">
                            <i class="fas fa-download"></i>
                        </button>
                        <button class="icon-btn" onclick="swapToInput()" title="Use as Input">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                    </div>
                </div>
                <textarea id="outputSQL" placeholder="Formatted SQL will appear here..." readonly></textarea>
                <div class="status-bar">
                    <span id="outputStats"><i class="fas fa-font"></i> 0 characters</span>
                    <span id="sizeDiff"></span>
                </div>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="examples">
            <h3><i class="fas fa-lightbulb"></i> Try Examples</h3>
            <div class="example-grid">
                <button class="example-btn" onclick="loadExample('select')">
                    <strong><i class="fas fa-check"></i> SELECT Query</strong>
                    <span>Basic select query</span>
                </button>
                <button class="example-btn" onclick="loadExample('insert')">
                    <strong><i class="fas fa-plus"></i> INSERT Query</strong>
                    <span>Insert data query</span>
                </button>
                <button class="example-btn" onclick="loadExample('update')">
                    <strong><i class="fas fa-edit"></i> UPDATE Query</strong>
                    <span>Update data query</span>
                </button>
                <button class="example-btn" onclick="loadExample('complex')">
                    <strong><i class="fas fa-code"></i> Complex Query</strong>
                    <span>JOIN with subqueries</span>
                </button>
            </div>
        </div>

        <footer>
            <p>SQL Formatter - Format and compress your SQL queries</p>
        </footer>
    </div>

    <input type="file" id="fileInput" style="display: none" accept=".sql">

    <script>
        let currentDialect = 'standard';
        const currentKeywordCase = 'uppercase';
        const dialectKeywords = {
            standard: [],
            mysql: ['IF', 'IGNORE', 'USE', 'REPLACE', 'OUTFILE', 'INNER JOIN', 'STRA_TO_DATE', 'SHOW', 'CREATE', 'DATABASE', 'TABLE', 'MODIFY', 'ENGINE', 'INNODB', 'AUTO_INCREMENT', 'CURRENT_TIMESTAMP', 'SCHEMA', 'COLLATION', 'KEY', 'PARTITION', 'PROCEDURE'],
            postgres: ['IF', 'ONLY', 'RETURNING', 'LATERAL', 'JOIN', 'WINDOW', 'PARTITION', 'OVER', 'LIKE', 'ILIKE', 'SIMILAR', 'ANALYZE', 'EXPLAIN', 'VERBOSE', 'CAST', 'CURRENT_DATE', 'CURRENT_TIME', 'CURRENT_TIMESTAMP', 'NOW', 'DATE_TRUNC', 'TO_DATE', 'TO_CHAR', 'TO_NUMBER', 'STRING_AGG', 'ARRAY_AGG', 'JSONB_AGG', 'JSONB_PATH_EXISTS', 'GEN_RANDOM_UUID'],
            sqlite: ['IF', 'ONLY', 'IGNORE', 'REPLACE', 'ROWID', 'AUTOINCREMENT', 'LIMIT', 'OFFSET', 'GLOB', 'UNION', 'GROUP_CONCAT', 'COALESCE', 'NULLIF', 'IFNULL', 'IIF', 'RANDOM', 'ABS', 'INSTR', 'SUBSTR', 'REPLACE', 'LIKE', 'GLOB', 'DATE', 'TIME', 'DATETIME', 'JULIANDAY', 'STRFTIME', 'ZEROBLOB', 'JSON_ARRAY', 'JSON_OBJECT', 'JSON_EXTRACT', 'JSON', 'TYPEOF', 'CAST']
        };
        const commonKeywords = [
            'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'NOT', 'IN', 'IS', 'NULL', 'AS', 'ON', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'FULL', 'CROSS', 'GROUP', 'BY', 'HAVING', 'ORDER', 'ASC', 'DESC', 'LIMIT', 'OFFSET', 'INSERT', 'INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE', 'CREATE', 'ALTER', 'DROP', 'TRUNCATE', 'INDEX', 'TABLE', 'DATABASE', 'UNION', 'ALL', 'DISTINCT', 'EXISTS', 'BETWEEN', 'LIKE', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'CAST', 'CONVERT', 'WITH', 'NO', 'DATA', 'PRIMARY', 'KEY', 'FOREIGN', 'REFERENCES', 'CONSTRAINT', 'DEFAULT', 'AUTO_INCREMENT', 'UNSIGNED', 'ZEROFILL', 'USING', 'BTREE', 'HASH', 'ENGINE', 'CHARSET', 'COLLATE', 'COMMENT', 'PROCEDURE', 'FUNCTION', 'TRIGGER', 'VIEW', 'SCHEMA', 'GRANT', 'REVOKE', 'COMMIT', 'ROLLBACK', 'BEGIN', 'TRANSACTION', 'LOCK', 'UNLOCK', 'TABLES', 'SHOW', 'DESCRIBE', 'EXPLAIN'
        ];
        const functions = [
            'COUNT', 'SUM', 'AVG', 'MIN', 'MAX', 'COALESCE', 'NULLIF', 'IFNULL', 'CONCAT', 'SUBSTRING', 'TRIM', 'UPPER', 'LOWER', 'LENGTH', 'CHAR_LENGTH', 'ROUND', 'FLOOR', 'CEILING', 'ABS', 'MOD', 'POWER', 'SQRT', 'NOW', 'CURDATE', 'CURTIME', 'DATE_FORMAT', 'YEAR', 'MONTH', 'DAY', 'HOUR', 'MINUTE', 'SECOND', 'DATEDIFF', 'DATE_ADD', 'TIMESTAMPDIFF', 'UNIX_TIMESTAMP', 'FROM_UNIXTIME', 'JSON_EXTRACT', 'JSON_UNQUOTE', 'JSON_ARRAY', 'JSON_OBJECT', 'GROUP_CONCAT', 'ROW_NUMBER', 'RANK', 'DENSE_RANK', 'LAG', 'LEAD', 'FIRST_VALUE', 'LAST_VALUE'
        ];
        const operators = ['=', '<>', '!=', '<=', '>=', '<', '>', '\\+', '-', '*', '/', '%', '^', '||', '&&', '!'];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('inputSQL').value = e.target.result;
                    updateStats();
                };
                reader.readAsText(file);
            }
            this.value = '';
        });

        function getKeywords() {
            return [...commonKeywords, ...(dialectKeywords[currentDialect] || [])];
        }

        function formatSQL() {
            hideError();
            const input = document.getElementById('inputSQL').value;
            if (!input.trim()) {
                showError('Please enter a SQL query');
                return;
            }
            try {
                let sql = input;
                // Remove comments
                if (document.getElementById('removeComments').checked) {
                    sql = sql.replace(/--[^\n]*/g, '').replace(/#[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');
                }
                // Normalize whitespace
                sql = sql.replace(/\s+/g, ' ').trim();
                // Get keywords for current dialect
                const keywords = getKeywords();
                // Format keywords
                const keywordRegex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'gi');
                sql = sql.replace(keywordRegex, match => match.toUpperCase());
                // Uppercase keywords if option is set
                if (currentKeywordCase === 'uppercase') {
                    sql = sql.replace(keywordRegex, match => match.toUpperCase());
                }
                // Format indentation
                const indentSize = parseInt(document.getElementById('indentSize').value) || 2;
                const indent = ' '.repeat(indentSize);
                let formatted = '';
                let indentLevel = 0;
                let inString = false;
                let stringChar = '';
                const increaseIndent = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'GROUP', 'HAVING', 'ORDER', 'LIMIT', 'OFFSET', 'UNION', 'INSERT', 'VALUES', 'UPDATE', 'SET', 'CREATE', 'TABLE', 'ALTER', 'DROP', 'WITH', 'CASE', 'WHEN', 'THEN', 'ELSE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'FULL', 'CROSS', 'ON'];
                const decreaseIndent = ['FROM', 'WHERE', 'GROUP', 'HAVING', 'ORDER', 'LIMIT', 'UNION', 'VALUES', 'SET', 'TABLE', 'WITH', 'END', 'ON'];
                const lines = sql.split('\n');
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    // Check for string literals
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if ((char === "'" || char === "'") && (i === 0 || line[i-1] !== '\\')) {
                            if (!inString) {
                                inString = true;
                                stringChar = char;
                            } else if (char === stringChar) {
                                inString = false;
                            }
                        }
                    }
                    // Decrease indent for certain keywords
                    const upperLine = line.toUpperCase();
                    for (const keyword of decreaseIndent) {
                        if (upperLine.startsWith(keyword + ' ') || upperLine === keyword) {
                            indentLevel = Math.max(0, indentLevel - 1);
                            break;
                        }
                    }
                    formatted += indent.repeat(indentLevel) + line + '\n';
                    // Increase indent for certain keywords
                    for (const keyword of increaseIndent) {
                        if (upperLine.startsWith(keyword + ' ') || upperLine === keyword) {
                            indentLevel++;
                            break;
                        }
                    }
                }
                document.getElementById('outputSQL').value = formatted.trim();
                updateStats();
            } catch (err) {
                showError('Error formatting SQL: ' + err.message);
            }
        }

        function highlightSQL(sql) {
            const keywords = getKeywords();
            const regex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'gi');
            let highlighted = sql;
            // Highlight keywords
            for (const keyword of keywords) {
                regex.lastIndex = 0;
                const keywordRegex = new RegExp(`(^|\\s)${keyword}\\b`, 'gm');
                highlighted = highlighted.replace(keywordRegex, `<span class="keyword">${keyword}</span>`);
            }
            // Highlight functions
            for (const func of functions) {
                const funcRegex = new RegExp(`\\b${func}\\s*\\(`, 'g');
                highlighted = highlighted.replace(funcRegex, `<span class="function">${func}(</span>`);
            }
            // Highlight strings
            highlighted = highlighted.replace(/'([^']*)'/g, '<span class="string">\'$1\'</span>');
            highlighted = highlighted.replace(/"([^"]*)"/g, '<span class="string">"$1"</span>');
            // Highlight numbers
            highlighted = highlighted.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
            // Highlight operators
            for (const op of operators) {
                highlighted = highlighted.replace(new RegExp(`\\s\\${op.replace(/[.*+?^${}/]/g, '\\$&')}\\s`, 'g'), ` <span class="operator">${op}</span> `);
            }
            // Highlight brackets
            highlighted = highlighted.replace(/([()])/g, '<span class="bracket">$1</span>');
            return highlighted;
        }

        function compress() {
            hideError();
            const input = document.getElementById('inputSQL').value;
            if (!input.trim()) {
                showError('Please enter a SQL query');
                return;
            }
            // Remove comments
            let compressed = input.replace(/--[^\n]*/g, '').replace(/#[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');
            // Remove extra whitespace
            compressed = compressed.replace(/\s+/g, ' ').trim();
            document.getElementById('outputSQL').value = compressed;
            updateStats();
        }

        function copyOutput() {
            const output = document.getElementById('outputSQL').value
            if (!output) {
                showError('No output to copy')
                return
            }
            navigator.clipboard.writeText(output).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function downloadOutput() {
            const output = document.getElementById('outputSQL').value
            if (!output) {
                showError('No output to download')
                return
            }
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `query_${new Date().toISOString().slice(0, 10)}.sql`;
            a.click()
            URL.revokeObjectURL(url);
        }
        function swapToInput() {
            const output = document.getElementById('outputSQL').value
            if (output) {
                document.getElementById('inputSQL').value = output
                document.getElementById('outputSQL').value = ''
                updateStats()
            }
        }
        function clearEditor() {
            document.getElementById('inputSQL').value = ''
            document.getElementById('outputSQL').value = ''
            hideError()
            updateStats()
        }
        function updateStats() {
            const input = document.getElementById('inputSQL').value
            const output = document.getElementById('outputSQL').value
            document.getElementById('inputStats').innerHTML = `<i class="fas fa-font"></i> ${input.length} characters`
            document.getElementById('inputLines').innerHTML = `<i class="fas fa-align-left"></i> ${(input ? input.split('\n').length : 0)} lines
            document.getElementById('outputStats').innerHTML = `<i class="fas fa-font"></i> ${output.length} characters`
            if (input.length > 0 && output.length > 0) {
                const diff = output.length - input.length
                const percent = ((diff / input.length) * 100).toFixed(1)
                const diffEl = document.getElementById('sizeDiff')
                if (diff < 0) {
                    diffEl.innerHTML = `<span class="savings">${Math.abs(diff)} chars saved (${Math.abs(percent)}%)</span>`
                } else if (diff > 0) {
                    diffEl.innerHTML = `<span class="growth">+${diff} chars (+${percent}%)</span>`
                } else {
                    diffEl.innerHTML = 'No change'
                }
            } else {
                document.getElementById('sizeDiff').innerHTML = ''
            }
        }
        function loadExample(type) {
            const examples = {
                select: `SELECT u.id, u.name, u.email, u.created_at FROM users WHERE u.status = 'active' ORDER BY u.created_at DESC LIMIT 10`,
                insert: `INSERT INTO users ( name, email, status, created_at) VALUES ('John Doe', 'john@example.com', 'active', NOW())`,
                update: `UPDATE users SET status = 'inactive', last_login = NOW() WHERE last_login < DATE_SUB(NOW() - INTERVAL '30 days')`,
                complex: `WITH user_stats AS (
    SELECT
        u.id,
        u.name
        COUNT(o.id) as order_count
        MAX(o.total_amount) as total_spent
    FROM users u
    LEFT JOIN orders o ON u.id = o.user_id
    WHERE u.created_at >= '2024-01-01'
    GROUP BY u.id, u.name
    HAVING COUNT(o.id) > 0
            )
            order by u.name
            )
        }
    }
            document.getElementById('inputSQL').value = examples[type]
            updateStats()
        }
        function setDialect(dialect) {
            currentDialect = dialect
            document.querySelectorAll('.dialect-select button').forEach(btn => {
                btn.classList.remove('active')
            })
            document.getElementById(dialect + 'Btn').classList.add('active')
        }
        function setKeywordCase(keywordCase) {
            currentKeywordCase = keywordCase
            document.querySelectorAll('.keyword-case button').forEach(btn => {
                btn.classList.remove('active')
            })
            document.getElementById(keywordCase + 'Btn').classList.add('active')
        }
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('visible')
        }
        function hideError() {
            document.getElementById('errorMessage').classList.remove('visible')
        }
        document.getElementById('inputSQL').addEventListener('input', updateStats);
        // Load saved data
        const saved = localStorage.getItem('sql-formatter-data')
        if (saved) {
            try {
                const data = JSON.parse(saved)
                document.getElementById('inputSQL').value = data.input || '';
                setDialect(data.dialect || 'standard')
                updateStats()
            } catch (e) {
        }
    }
    // Save data
    window.addEventListener('beforeunload', () => {
                localStorage.setItem('sql-formatter-data', JSON.stringify({
                    input: document.getElementById('inputSQL').value,
                    dialect: currentDialect
                }));
            });
        });
    </script>
</body>
</html>
