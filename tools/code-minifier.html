<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Minifier - Dev Toolbox</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .minifier-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .minifier-container {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .panel-header h3 {
            margin: 0;
            color: var(--text-primary);
        }
        textarea {
            width: 100%;
            height: 300px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            color: var(--text-primary);
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-secondary {
            background: var(--secondary-bg);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--border-color);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .options-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-group label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .language-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .lang-tab {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: var(--secondary-bg);
            padding: 5px 10px;
            border-radius: 4px;
        }
        .stat-item strong {
            color: var(--primary-color);
        }
        .savings {
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="tool-container">
        <header class="tool-header">
            <h1>🗜️ Code Minifier</h1>
            <p class="tool-description">Minify JavaScript, CSS, and HTML code for production</p>
        </header>

        <div class="language-tabs">
            <button class="lang-tab active" onclick="setLanguage('js')">JavaScript</button>
            <button class="lang-tab" onclick="setLanguage('css')">CSS</button>
            <button class="lang-tab" onclick="setLanguage('html')">HTML</button>
        </div>

        <div class="options-panel" id="jsOptions">
            <div class="option-group">
                <input type="checkbox" id="removeComments" checked>
                <label for="removeComments">Remove comments</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="removeWhitespace" checked>
                <label for="removeWhitespace">Remove whitespace</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="removeNewlines" checked>
                <label for="removeNewlines">Remove newlines</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="shortenVars">
                <label for="shortenVars">Shorten variable names (basic)</label>
            </div>
        </div>

        <div class="options-panel" id="cssOptions" style="display: none;">
            <div class="option-group">
                <input type="checkbox" id="cssRemoveComments" checked>
                <label for="cssRemoveComments">Remove comments</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="cssRemoveWhitespace" checked>
                <label for="cssRemoveWhitespace">Remove whitespace</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="cssMergeRules">
                <label for="cssMergeRules">Merge similar rules</label>
            </div>
        </div>

        <div class="options-panel" id="htmlOptions" style="display: none;">
            <div class="option-group">
                <input type="checkbox" id="htmlRemoveComments" checked>
                <label for="htmlRemoveComments">Remove comments</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="htmlCollapseWhitespace" checked>
                <label for="htmlCollapseWhitespace">Collapse whitespace</label>
            </div>
            <div class="option-group">
                <input type="checkbox" id="htmlRemoveEmptyAttrs">
                <label for="htmlRemoveEmptyAttrs">Remove empty attributes</label>
            </div>
        </div>

        <div class="minifier-container">
            <div class="panel">
                <div class="panel-header">
                    <h3>Input Code</h3>
                    <button class="btn btn-secondary" onclick="loadSample()">📝 Load Sample</button>
                </div>
                <textarea id="inputCode" placeholder="Paste your code here..."></textarea>
                <div class="stats-bar">
                    <div class="stat-item">Original: <strong id="originalSize">0 B</strong></div>
                    <div class="stat-item">Lines: <strong id="originalLines">0</strong></div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="minify()">🗜️ Minify Code</button>
                    <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3>Minified Output</h3>
                    <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy</button>
                </div>
                <textarea id="outputCode" readonly placeholder="Minified code will appear here..."></textarea>
                <div class="stats-bar">
                    <div class="stat-item">Minified: <strong id="minifiedSize">0 B</strong></div>
                    <div class="stat-item savings">Saved: <strong id="savedPercent">0%</strong></div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="downloadMinified()">💾 Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLanguage = 'js';

        const samples = {
            js: `// User authentication module
function authenticateUser(username, password) {
    // Check if username exists
    if (!username || username.length === 0) {
        console.error("Username is required");
        return false;
    }

    // Check if password is valid
    if (!password || password.length < 8) {
        console.error("Password must be at least 8 characters");
        return false;
    }

    // Simulate API call
    const userData = {
        username: username,
        password: password,
        timestamp: Date.now()
    };

    /* Validate credentials
       against the database */
    return validateCredentials(userData);
}

function validateCredentials(data) {
    // TODO: Implement actual validation
    return data.username === "admin";
}`,
            css: `/* Main container styles */
.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* Header styling */
.header {
    background-color: #ffffff;
    border-bottom: 1px solid #e0e0e0;
    padding: 15px 20px;
}

.header .logo {
    font-size: 24px;
    font-weight: bold;
    color: #333333;
}

/* Button styles */
.btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
}

.btn-primary {
    background-color: #007bff;
    color: #ffffff;
    border: none;
}

.btn-primary:hover {
    background-color: #0056b3;
}`,
            html: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Page</title>
</head>
<body>
    <!-- Main Header -->
    <header class="header">
        <nav class="navigation">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Contact</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <h1>Welcome to Our Site</h1>
        <p>This is a sample paragraph with some text content.</p>
    </main>
</body>
</html>`
        };

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('jsOptions').style.display = lang === 'js' ? 'flex' : 'none';
            document.getElementById('cssOptions').style.display = lang === 'css' ? 'flex' : 'none';
            document.getElementById('htmlOptions').style.display = lang === 'html' ? 'flex' : 'none';
        }

        function loadSample() {
            document.getElementById('inputCode').value = samples[currentLanguage];
            updateInputStats();
        }

        function updateInputStats() {
            const code = document.getElementById('inputCode').value;
            const size = new Blob([code]).size;
            const lines = code.split('\n').length;

            document.getElementById('originalSize').textContent = formatBytes(size);
            document.getElementById('originalLines').textContent = lines;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function minify() {
            const input = document.getElementById('inputCode').value;
            if (!input.trim()) {
                alert('Please enter some code to minify');
                return;
            }

            let output;
            switch (currentLanguage) {
                case 'js':
                    output = minifyJS(input);
                    break;
                case 'css':
                    output = minifyCSS(input);
                    break;
                case 'html':
                    output = minifyHTML(input);
                    break;
            }

            document.getElementById('outputCode').value = output;
            updateOutputStats();
        }

        function minifyJS(code) {
            const removeComments = document.getElementById('removeComments').checked;
            const removeWhitespace = document.getElementById('removeWhitespace').checked;
            const removeNewlines = document.getElementById('removeNewlines').checked;
            const shortenVars = document.getElementById('shortenVars').checked;

            let result = code;

            if (removeComments) {
                // Remove single-line comments (but not URLs)
                result = result.replace(/(?<!:)\/\/.*$/gm, '');
                // Remove multi-line comments
                result = result.replace(/\/\*[\s\S]*?\*\//g, '');
            }

            if (removeNewlines) {
                result = result.replace(/\n/g, ' ');
            }

            if (removeWhitespace) {
                // Remove multiple spaces
                result = result.replace(/\s+/g, ' ');
                // Remove spaces around operators
                result = result.replace(/\s*([{};:,=+\-*/<>!&|()])\s*/g, '$1');
                // Restore necessary spaces
                result = result.replace(/\b(var|let|const|function|return|if|else|for|while|class|new|typeof|instanceof)\b/g, ' $1 ');
                result = result.replace(/\s+/g, ' ').trim();
            }

            if (shortenVars) {
                // Basic variable shortening (local only)
                const varMap = {};
                let varCounter = 0;
                result = result.replace(/\b(var|let|const)\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, (match, keyword, varName) => {
                    if (varName.length > 2 && !varMap[varName]) {
                        varMap[varName] = 'v' + (varCounter++).toString(36);
                    }
                    return keyword + ' ' + (varMap[varName] || varName);
                });
                // Replace occurrences
                Object.entries(varMap).forEach(([original, shortened]) => {
                    const regex = new RegExp('\\b' + original + '\\b', 'g');
                    result = result.replace(regex, shortened);
                });
            }

            return result;
        }

        function minifyCSS(code) {
            const removeComments = document.getElementById('cssRemoveComments').checked;
            const removeWhitespace = document.getElementById('cssRemoveWhitespace').checked;

            let result = code;

            if (removeComments) {
                result = result.replace(/\/\*[\s\S]*?\*\//g, '');
            }

            if (removeWhitespace) {
                result = result.replace(/\s+/g, ' ');
                result = result.replace(/\s*([{};:,>~+])\s*/g, '$1');
                result = result.replace(/;}/g, '}');
                result = result.trim();
            }

            return result;
        }

        function minifyHTML(code) {
            const removeComments = document.getElementById('htmlRemoveComments').checked;
            const collapseWhitespace = document.getElementById('htmlCollapseWhitespace').checked;
            const removeEmptyAttrs = document.getElementById('htmlRemoveEmptyAttrs').checked;

            let result = code;

            if (removeComments) {
                result = result.replace(/<!--[\s\S]*?-->/g, '');
            }

            if (collapseWhitespace) {
                result = result.replace(/\s+/g, ' ');
                result = result.replace(/>\s+</g, '><');
                result = result.trim();
            }

            if (removeEmptyAttrs) {
                result = result.replace(/\s+[a-zA-Z-]+=["']\s*["']/g, '');
            }

            return result;
        }

        function updateOutputStats() {
            const original = document.getElementById('inputCode').value;
            const minified = document.getElementById('outputCode').value;

            const originalSize = new Blob([original]).size;
            const minifiedSize = new Blob([minified]).size;

            const saved = originalSize > 0 ? ((originalSize - minifiedSize) / originalSize * 100).toFixed(1) : 0;

            document.getElementById('minifiedSize').textContent = formatBytes(minifiedSize);
            document.getElementById('savedPercent').textContent = saved + '%';
        }

        function copyOutput() {
            const output = document.getElementById('outputCode').value;
            if (!output) {
                alert('No minified code to copy');
                return;
            }
            navigator.clipboard.writeText(output).then(() => {
                alert('Minified code copied to clipboard!');
            });
        }

        function downloadMinified() {
            const output = document.getElementById('outputCode').value;
            if (!output) {
                alert('No minified code to download');
                return;
            }

            const extensions = { js: 'js', css: 'css', html: 'html' };
            const ext = extensions[currentLanguage];
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `minified.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            document.getElementById('inputCode').value = '';
            document.getElementById('outputCode').value = '';
            document.getElementById('originalSize').textContent = '0 B';
            document.getElementById('originalLines').textContent = '0';
            document.getElementById('minifiedSize').textContent = '0 B';
            document.getElementById('savedPercent').textContent = '0%';
        }

        // Auto-update stats on input
        document.getElementById('inputCode').addEventListener('input', updateInputStats);

        // Initialize
        updateInputStats();
    </script>
</body>
</html>
