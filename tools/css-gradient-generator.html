<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Gradient Generator - 开发者工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; padding: 20px 0; color: #00d4ff; }
        
        .generator { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        
        .preview-panel { background: #16213e; border-radius: 12px; padding: 20px; }
        .preview { 
            width: 100%; height: 400px; border-radius: 12px; 
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: background 0.3s;
        }
        
        .controls-panel { background: #16213e; border-radius: 12px; padding: 20px; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; margin-bottom: 8px; color: #888; font-size: 14px; }
        
        select, input[type="text"], input[type="number"] {
            width: 100%; background: #1a1a2e; border: 1px solid #333; 
            color: #eee; padding: 10px; border-radius: 6px;
        }
        
        .colors-list { margin-bottom: 15px; }
        .color-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .color-row input[type="color"] { width: 50px; height: 40px; border: none; cursor: pointer; }
        .color-row input[type="text"] { flex: 1; }
        .color-row input[type="number"] { width: 80px; }
        .color-row button { padding: 8px 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        button.add-color { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        
        .output { background: #1a1a2e; border-radius: 6px; padding: 15px; margin-top: 15px; }
        .output pre { white-space: pre-wrap; word-break: break-all; font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; color: #27ae60; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .actions button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .copy-btn { background: #00d4ff; color: #1a1a2e; }
        .random-btn { background: #9b59b6; color: white; }
        
        .presets { margin-top: 20px; }
        .presets h3 { margin-bottom: 10px; color: #888; }
        .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .preset { height: 50px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .preset:hover { border-color: #00d4ff; transform: scale(1.05); }
        
        .angle-control { display: flex; align-items: center; gap: 15px; }
        .angle-wheel { width: 100px; height: 100px; border-radius: 50%; background: #1a1a2e; position: relative; cursor: pointer; }
        .angle-indicator { position: absolute; width: 4px; height: 40px; background: #00d4ff; left: 50%; top: 10px; transform-origin: bottom center; border-radius: 2px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { padding: 8px 16px; background: transparent; border: none; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 CSS Gradient Generator</h1>
        
        <div class="generator">
            <div class="preview-panel">
                <h2 style="margin-bottom: 15px; color: #00d4ff;">Preview</h2>
                <div class="preview" id="preview"></div>
                
                <div class="output">
                    <h3 style="color: #888; margin-bottom: 10px;">CSS Code</h3>
                    <pre id="css-output">background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);</pre>
                </div>
                
                <div class="actions">
                    <button class="copy-btn" onclick="copyCss()">📋 Copy CSS</button>
                    <button class="random-btn" onclick="randomGradient()">🎲 Random</button>
                </div>
                
                <div class="presets">
                    <h3>Popular Presets</h3>
                    <div class="preset-grid" id="presets"></div>
                </div>
            </div>
            
            <div class="controls-panel">
                <h2 style="margin-bottom: 15px; color: #00d4ff;">Settings</h2>
                
                <div class="tabs">
                    <button class="tab active" onclick="setGradientType('linear')">Linear</button>
                    <button class="tab" onclick="setGradientType('radial')">Radial</button>
                    <button class="tab" onclick="setGradientType('conic')">Conic</button>
                </div>
                
                <div class="control-group" id="angle-group">
                    <label>Angle: <span id="angle-value">90</span>°</label>
                    <input type="range" id="angle" min="0" max="360" value="90" oninput="updateGradient()">
                </div>
                
                <div class="control-group" id="radial-options" style="display:none;">
                    <label>Shape</label>
                    <select id="radial-shape" onchange="updateGradient()">
                        <option value="circle">Circle</option>
                        <option value="ellipse">Ellipse</option>
                    </select>
                    <label style="margin-top: 10px;">Position</label>
                    <select id="radial-position" onchange="updateGradient()">
                        <option value="center">Center</option>
                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Colors</label>
                    <div class="colors-list" id="colors-list"></div>
                    <button class="add-color" onclick="addColor()">+ Add Color</button>
                </div>
                
                <div class="control-group">
                    <label>CSS Output Format</label>
                    <select id="output-format" onchange="updateGradient()">
                        <option value="modern">Modern (background:)</option>
                        <option value="background-image">background-image:</option>
                        <option value="full">Full Background Property</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let colors = [
            { color: '#667eea', position: 0 },
            { color: '#764ba2', position: 100 }
        ];
        let gradientType = 'linear';
        let angle = 90;
        
        const presets = [
            ['#667eea', '#764ba2'],
            ['#f093fb', '#f5576c'],
            ['#4facfe', '#00f2fe'],
            ['#43e97b', '#38f9d7'],
            ['#fa709a', '#fee140'],
            ['#a8edea', '#fed6e3'],
            ['#ff0844', '#ffb199'],
            ['#ffecd2', '#fcb69f'],
            ['#a1c4fd', '#c2e9fb'],
            ['#d299c2', '#fef9d7'],
            ['#89f7fe', '#66a6ff'],
            ['#cd9cf2', '#f6f3ff'],
            ['#fddb92', '#d1fdff'],
            ['#9890e3', '#b1f4cf'],
            ['#ebc0fd', '#d9ded8'],
            ['#f6d365', '#fda085']
        ];
        
        function addColor() {
            colors.push({ color: '#ffffff', position: Math.min(100, colors[colors.length - 1].position + 25) });
            renderColors();
            updateGradient();
        }
        
        function removeColor(index) {
            if (colors.length > 2) {
                colors.splice(index, 1);
                renderColors();
                updateGradient();
            }
        }
        
        function updateColor(index, field, value) {
            colors[index][field] = field === 'position' ? parseInt(value) : value;
            updateGradient();
        }
        
        function renderColors() {
            const list = document.getElementById('colors-list');
            list.innerHTML = colors.map((c, i) => `
                <div class="color-row">
                    <input type="color" value="${c.color}" onchange="updateColor(${i}, 'color', this.value)">
                    <input type="text" value="${c.color}" onchange="updateColor(${i}, 'color', this.value)">
                    <input type="number" min="0" max="100" value="${c.position}" onchange="updateColor(${i}, 'position', this.value)">
                    <button onclick="removeColor(${i})">×</button>
                </div>
            `).join('');
        }
        
        function setGradientType(type) {
            gradientType = type;
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('angle-group').style.display = type === 'linear' ? 'block' : 'none';
            document.getElementById('radial-options').style.display = type === 'linear' ? 'none' : 'block';
            
            updateGradient();
        }
        
        function updateGradient() {
            angle = parseInt(document.getElementById('angle').value);
            document.getElementById('angle-value').textContent = angle;
            
            const sortedColors = [...colors].sort((a, b) => a.position - b.position);
            const colorStops = sortedColors.map(c => `${c.color} ${c.position}%`).join(', ');
            
            let gradient;
            if (gradientType === 'linear') {
                gradient = `linear-gradient(${angle}deg, ${colorStops})`;
            } else if (gradientType === 'radial') {
                const shape = document.getElementById('radial-shape').value;
                const position = document.getElementById('radial-position').value;
                gradient = `radial-gradient(${shape} at ${position}, ${colorStops})`;
            } else {
                gradient = `conic-gradient(from ${angle}deg, ${colorStops})`;
            }
            
            document.getElementById('preview').style.background = gradient;
            
            const format = document.getElementById('output-format').value;
            let css;
            if (format === 'modern') {
                css = `background: ${gradient};`;
            } else if (format === 'background-image') {
                css = `background-image: ${gradient};`;
            } else {
                css = `background: ${gradient};\nbackground-repeat: no-repeat;\nbackground-size: cover;`;
            }
            
            document.getElementById('css-output').textContent = css;
        }
        
        function copyCss() {
            navigator.clipboard.writeText(document.getElementById('css-output').textContent);
            alert('CSS copied!');
        }
        
        function randomGradient() {
            const randomPresets = presets.sort(() => Math.random() - 0.5).slice(0, 2 + Math.floor(Math.random() * 2));
            colors = randomPresets.map((preset, i) => ({
                color: preset[Math.floor(Math.random() * preset.length)],
                position: Math.round((i / (randomPresets.length - 1)) * 100)
            }));
            angle = Math.floor(Math.random() * 360);
            document.getElementById('angle').value = angle;
            renderColors();
            updateGradient();
        }
        
        function renderPresets() {
            const grid = document.getElementById('presets');
            grid.innerHTML = presets.map((p, i) => `
                <div class="preset" style="background: linear-gradient(135deg, ${p[0]}, ${p[1]})" onclick="applyPreset(${i})"></div>
            `).join('');
        }
        
        function applyPreset(index) {
            colors = presets[index].map((color, i) => ({
                color,
                position: Math.round((i / (presets[index].length - 1)) * 100)
            }));
            renderColors();
            updateGradient();
        }
        
        // Initialize
        renderColors();
        renderPresets();
        updateGradient();
    </script>
</body>
</html>
