<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - Browser-Based Image Optimization</title>
    <meta name="description" content="Compress and optimize images in your browser. No upload needed - all processing happens locally. Supports JPEG, PNG, WebP.">
    <meta name="keywords" content="image compressor, image optimizer, compress images, reduce image size, browser image compression">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        .drop-zone {
            border: 2px dashed rgba(0,212,255,0.5);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        .drop-zone-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .drop-zone p {
            color: #888;
            margin-bottom: 5px;
        }
        .drop-zone .formats {
            font-size: 0.85rem;
            color: #666;
        }
        #fileInput {
            display: none;
        }
        .settings {
            margin-top: 15px;
        }
        .setting-group {
            margin-bottom: 15px;
        }
        .setting-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .setting-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            -webkit-appearance: none;
        }
        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
        }
        .setting-value {
            text-align: right;
            font-size: 0.9rem;
            color: #00d4ff;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            font-size: 1rem;
        }
        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00d4ff;
        }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .preview-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .preview-box h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .image-info {
            font-size: 0.85rem;
            color: #aaa;
        }
        .image-info .size {
            font-weight: bold;
            color: #00d4ff;
        }
        .image-info .saved {
            color: #4ade80;
        }
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,212,255,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-primary:disabled, .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .batch-container {
            margin-top: 30px;
        }
        .batch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .batch-list {
            display: grid;
            gap: 10px;
        }
        .batch-item {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr auto;
            gap: 15px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 8px;
        }
        .batch-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }
        .batch-item .filename {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .batch-item .sizes {
            font-size: 0.85rem;
        }
        .batch-item .sizes .original {
            color: #888;
        }
        .batch-item .sizes .compressed {
            color: #00d4ff;
        }
        .batch-item .sizes .saved {
            color: #4ade80;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar .progress {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            transition: width 0.3s;
        }
        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .status.success {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: #4ade80;
            display: block;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            display: block;
        }
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .comparison, .preview-container {
                grid-template-columns: 1fr;
            }
            .batch-item {
                grid-template-columns: auto 1fr auto;
            }
        }
        .stat-box {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .stat-box .value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-box .label {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }
        .download-all {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ Image Compressor</h1>
            <p class="subtitle">Compress images in your browser - 100% private, no uploads</p>
        </header>

        <div class="main-content">
            <div class="card">
                <h2>📤 Upload Images</h2>
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon">📁</div>
                    <p>Drop images here or click to select</p>
                    <p class="formats">Supports: JPEG, PNG, WebP, BMP</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*">

                <div class="settings">
                    <div class="setting-group">
                        <label>Quality: <span id="qualityValue">80%</span></label>
                        <input type="range" id="quality" min="10" max="100" value="80">
                    </div>

                    <div class="setting-group">
                        <label>Output Format</label>
                        <select id="format">
                            <option value="auto">Same as original</option>
                            <option value="image/jpeg">JPEG</option>
                            <option value="image/png">PNG</option>
                            <option value="image/webp">WebP (recommended)</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>Max Width (px) - leave empty for original</label>
                        <input type="number" id="maxWidth" placeholder="e.g., 1920">
                    </div>

                    <div class="setting-group">
                        <label>Max Height (px) - leave empty for original</label>
                        <input type="number" id="maxHeight" placeholder="e.g., 1080">
                    </div>

                    <div class="setting-group checkbox-group">
                        <input type="checkbox" id="keepMetadata">
                        <label for="keepMetadata">Preserve metadata (EXIF)</label>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>👁️ Preview</h2>
                <div id="previewArea">
                    <div class="drop-zone" style="padding: 60px; cursor: default;">
                        <p style="color: #666;">Upload images to see preview</p>
                    </div>
                </div>
                <div class="comparison" id="comparison" style="display: none;">
                    <div class="stat-box">
                        <div class="value" id="originalSize">-</div>
                        <div class="label">Original Size</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="compressedSize">-</div>
                        <div class="label">Compressed Size</div>
                    </div>
                </div>
                <div class="actions" id="singleActions" style="display: none;">
                    <button class="btn-primary" id="downloadBtn" disabled>⬇️ Download Compressed</button>
                </div>
            </div>
        </div>

        <div class="card batch-container" id="batchContainer" style="display: none;">
            <div class="batch-header">
                <h2>📋 Batch Compression</h2>
                <span id="batchCount">0 images</span>
            </div>
            <div class="progress-bar" id="batchProgress" style="display: none;">
                <div class="progress" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="batch-list" id="batchList"></div>
            <div class="download-all" id="batchActions" style="display: none;">
                <button class="btn-primary" id="downloadAllBtn">⬇️ Download All as ZIP</button>
                <button class="btn-secondary" id="clearAllBtn">🗑️ Clear All</button>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        // State
        let currentFile = null;
        let compressedBlob = null;
        let batchFiles = [];
        let compressedFiles = [];

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const formatSelect = document.getElementById('format');
        const maxWidthInput = document.getElementById('maxWidth');
        const maxHeightInput = document.getElementById('maxHeight');
        const previewArea = document.getElementById('previewArea');
        const comparison = document.getElementById('comparison');
        const originalSizeEl = document.getElementById('originalSize');
        const compressedSizeEl = document.getElementById('compressedSize');
        const downloadBtn = document.getElementById('downloadBtn');
        const singleActions = document.getElementById('singleActions');
        const batchContainer = document.getElementById('batchContainer');
        const batchList = document.getElementById('batchList');
        const batchCount = document.getElementById('batchCount');
        const batchProgress = document.getElementById('batchProgress');
        const progressBar = document.getElementById('progressBar');
        const batchActions = document.getElementById('batchActions');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const statusEl = document.getElementById('status');

        // Format bytes
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Calculate saved percentage
        function calcSaved(original, compressed) {
            const saved = ((original - compressed) / original * 100).toFixed(1);
            return saved > 0 ? `-${saved}%` : `+${Math.abs(saved)}%`;
        }

        // Compress image
        async function compressImage(file, quality, format, maxWidth, maxHeight) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Resize if needed
                        if (maxWidth && width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        if (maxHeight && height > maxHeight) {
                            width = (width * maxHeight) / height;
                            height = maxHeight;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Determine output format
                        let outputFormat = format;
                        if (format === 'auto') {
                            outputFormat = file.type || 'image/jpeg';
                        }

                        // PNG quality is ignored (lossless)
                        const outputQuality = outputFormat === 'image/png' ? undefined : quality / 100;

                        canvas.toBlob((blob) => {
                            if (blob) {
                                resolve({
                                    blob,
                                    width,
                                    height,
                                    format: outputFormat
                                });
                            } else {
                                reject(new Error('Failed to compress image'));
                            }
                        }, outputFormat, outputQuality);
                    };

                    img.onerror = () => reject(new Error('Failed to load image'));
                    img.src = e.target.result;
                };

                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        // Update preview
        function updatePreview(originalFile, compressed) {
            const preview = `
                <div class="preview-container">
                    <div class="preview-box">
                        <h3>Original</h3>
                        <img class="preview-image" src="${URL.createObjectURL(originalFile)}">
                        <div class="image-info">
                            Size: <span class="size">${formatBytes(originalFile.size)}</span><br>
                            ${compressed.width} × ${compressed.height}
                        </div>
                    </div>
                    <div class="preview-box">
                        <h3>Compressed</h3>
                        <img class="preview-image" src="${URL.createObjectURL(compressed.blob)}">
                        <div class="image-info">
                            Size: <span class="size">${formatBytes(compressed.blob.size)}</span><br>
                            <span class="saved">${calcSaved(originalFile.size, compressed.blob.size)}</span>
                        </div>
                    </div>
                </div>
            `;
            previewArea.innerHTML = preview;
            comparison.style.display = 'grid';
            originalSizeEl.textContent = formatBytes(originalFile.size);
            compressedSizeEl.textContent = formatBytes(compressed.blob.size);
        }

        // Process single file
        async function processFile(file) {
            currentFile = file;
            const quality = parseInt(qualitySlider.value);
            const format = formatSelect.value;
            const maxWidth = maxWidthInput.value ? parseInt(maxWidthInput.value) : null;
            const maxHeight = maxHeightInput.value ? parseInt(maxHeightInput.value) : null;

            try {
                compressedBlob = await compressImage(file, quality, format, maxWidth, maxHeight);
                updatePreview(file, compressedBlob);
                downloadBtn.disabled = false;
                singleActions.style.display = 'flex';
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            }
        }

        // Process batch
        async function processBatch(files) {
            batchFiles = Array.from(files);
            compressedFiles = [];
            batchCount.textContent = `${batchFiles.length} images`;
            batchContainer.style.display = 'block';
            batchProgress.style.display = 'block';
            batchList.innerHTML = '';

            const quality = parseInt(qualitySlider.value);
            const format = formatSelect.value;
            const maxWidth = maxWidthInput.value ? parseInt(maxWidthInput.value) : null;
            const maxHeight = maxHeightInput.value ? parseInt(maxHeightInput.value) : null;

            for (let i = 0; i < batchFiles.length; i++) {
                const file = batchFiles[i];
                const progress = ((i + 1) / batchFiles.length) * 100;
                progressBar.style.width = progress + '%';

                try {
                    const compressed = await compressImage(file, quality, format, maxWidth, maxHeight);
                    compressedFiles.push({ original: file, compressed });

                    const item = document.createElement('div');
                    item.className = 'batch-item';
                    item.innerHTML = `
                        <img src="${URL.createObjectURL(file)}">
                        <span class="filename">${file.name}</span>
                        <span class="sizes">
                            <span class="original">${formatBytes(file.size)}</span>
                            →
                            <span class="compressed">${formatBytes(compressed.blob.size)}</span>
                        </span>
                        <span class="saved">${calcSaved(file.size, compressed.blob.size)}</span>
                        <button class="btn-secondary" onclick="downloadSingle(${i})">⬇️</button>
                    `;
                    batchList.appendChild(item);
                } catch (err) {
                    console.error('Error processing', file.name, err);
                }
            }

            batchProgress.style.display = 'none';
            batchActions.style.display = 'flex';
            showStatus(`Successfully compressed ${compressedFiles.length} images!`, 'success');
        }

        // Download single compressed image
        function downloadSingle(index) {
            const item = compressedFiles[index];
            const ext = item.compressed.format.split('/')[1];
            const name = item.original.name.replace(/\.[^.]+$/, '') + '.' + ext;
            const url = URL.createObjectURL(item.compressed.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Download all as ZIP
        async function downloadAll() {
            // Simple implementation: download files one by one
            // For a real ZIP, we'd need JSZip library
            for (let i = 0; i < compressedFiles.length; i++) {
                downloadSingle(i);
                await new Promise(r => setTimeout(r, 300)); // Small delay between downloads
            }
        }

        // Show status
        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            setTimeout(() => {
                statusEl.className = 'status';
            }, 5000);
        }

        // Event listeners
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 1) {
                processBatch(files);
            } else if (files.length === 1) {
                processFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 1) {
                processBatch(files);
            } else if (files.length === 1) {
                processFile(files[0]);
            }
        });

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
            if (currentFile) {
                processFile(currentFile);
            }
        });

        formatSelect.addEventListener('change', () => {
            if (currentFile) {
                processFile(currentFile);
            }
        });

        maxWidthInput.addEventListener('change', () => {
            if (currentFile) {
                processFile(currentFile);
            }
        });

        maxHeightInput.addEventListener('change', () => {
            if (currentFile) {
                processFile(currentFile);
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!compressedBlob || !currentFile) return;
            const ext = compressedBlob.format.split('/')[1];
            const name = currentFile.name.replace(/\.[^.]+$/, '') + '.' + ext;
            const url = URL.createObjectURL(compressedBlob.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
        });

        downloadAllBtn.addEventListener('click', downloadAll);

        clearAllBtn.addEventListener('click', () => {
            batchFiles = [];
            compressedFiles = [];
            batchList.innerHTML = '';
            batchContainer.style.display = 'none';
            batchActions.style.display = 'none';
        });
    </script>
</body>
</html>
