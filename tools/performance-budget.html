<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Budget Calculator - 开发者工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; padding: 20px 0; color: #00d4ff; }
        
        .panel { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .panel h2 { margin-bottom: 15px; color: #00d4ff; font-size: 1.1rem; }
        
        .budget-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .budget-item { background: #1a1a2e; border-radius: 8px; padding: 15px; }
        .budget-item label { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .budget-item label span:last-child { color: #888; }
        
        .progress-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; transition: width 0.3s, background 0.3s; }
        .progress-fill.green { background: #27ae60; }
        .progress-fill.yellow { background: #f39c12; }
        .progress-fill.red { background: #e74c3c; }
        
        .budget-inputs { display: flex; gap: 10px; }
        .budget-inputs input { 
            flex: 1; background: #16213e; border: 1px solid #333; 
            color: #eee; padding: 8px; border-radius: 4px; text-align: right;
        }
        
        .totals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .total-item { background: #1a1a2e; border-radius: 8px; padding: 15px; text-align: center; }
        .total-value { font-size: 2rem; font-weight: bold; }
        .total-value.green { color: #27ae60; }
        .total-value.yellow { color: #f39c12; }
        .total-value.red { color: #e74c3c; }
        .total-label { color: #888; font-size: 12px; margin-top: 5px; }
        
        .presets { margin-top: 20px; }
        .presets h3 { margin-bottom: 10px; color: #888; }
        .preset-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .preset-btn { 
            padding: 10px 20px; background: #333; border: none; 
            color: #eee; border-radius: 6px; cursor: pointer;
        }
        .preset-btn:hover { background: #444; }
        
        .chart-container { margin-top: 20px; }
        .pie-chart { width: 200px; height: 200px; border-radius: 50%; margin: 0 auto; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; }
        
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .actions button { 
            flex: 1; padding: 12px; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold;
        }
        .save-btn { background: #27ae60; color: white; }
        .reset-btn { background: #e74c3c; color: white; }
        .export-btn { background: #00d4ff; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Performance Budget Calculator</h1>
        
        <div class="panel">
            <h2>Resource Budgets</h2>
            
            <div class="presets">
                <h3>Quick Presets</h3>
                <div class="preset-btns">
                    <button class="preset-btn" onclick="applyPreset('fast3g')">Fast 3G (1.6MB)</button>
                    <button class="preset-btn" onclick="applyPreset('slow3g')">Slow 3G (800KB)</button>
                    <button class="preset-btn" onclick="applyPreset('4g')">4G (3MB)</button>
                    <button class="preset-btn" onclick="applyPreset('custom')">Custom</button>
                </div>
            </div>
            
            <div class="budget-grid" id="budget-grid"></div>
            
            <div class="totals">
                <div class="total-item">
                    <div class="total-value" id="total-size">0</div>
                    <div class="total-label">Total Size (KB)</div>
                </div>
                <div class="total-item">
                    <div class="total-value" id="total-budget">1600</div>
                    <div class="total-label">Budget (KB)</div>
                </div>
                <div class="total-item">
                    <div class="total-value" id="remaining">1600</div>
                    <div class="total-label">Remaining (KB)</div>
                </div>
                <div class="total-item">
                    <div class="total-value" id="percent">0%</div>
                    <div class="total-label">Budget Used</div>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="pie-chart" id="pie-chart"></div>
                <div class="legend" id="legend"></div>
            </div>
            
            <div class="actions">
                <button class="save-btn" onclick="saveBudget()">💾 Save</button>
                <button class="reset-btn" onclick="resetBudget()">🗑️ Reset</button>
                <button class="export-btn" onclick="exportReport()">📋 Export Report</button>
            </div>
        </div>
    </div>
    
    <script>
        const categories = [
            { id: 'html', name: 'HTML', color: '#e74c3c', budget: 100, actual: 0 },
            { id: 'css', name: 'CSS', color: '#3498db', budget: 150, actual: 0 },
            { id: 'js', name: 'JavaScript', color: '#f39c12', budget: 400, actual: 0 },
            { id: 'images', name: 'Images', color: '#9b59b6', budget: 500, actual: 0 },
            { id: 'fonts', name: 'Fonts', color: '#1abc9c', budget: 150, actual: 0 },
            { id: 'videos', name: 'Video/Audio', color: '#e91e63', budget: 200, actual: 0 },
            { id: 'thirdParty', name: 'Third Party', color: '#795548', budget: 100, actual: 0 }
        ];
        
        const presets = {
            fast3g: { total: 1600, html: 50, css: 100, js: 300, images: 700, fonts: 100, videos: 200, thirdParty: 150 },
            slow3g: { total: 800, html: 30, css: 50, js: 150, images: 350, fonts: 50, videos: 100, thirdParty: 70 },
            '4g': { total: 3000, html: 100, css: 200, js: 600, images: 1200, fonts: 200, videos: 400, thirdParty: 300 },
            custom: { total: 2000, html: 100, css: 150, js: 400, images: 800, fonts: 150, videos: 200, thirdParty: 200 }
        };
        
        function renderBudgets() {
            const grid = document.getElementById('budget-grid');
            grid.innerHTML = categories.map(cat => `
                <div class="budget-item">
                    <label>
                        <span style="color: ${cat.color}">${cat.name}</span>
                        <span>${cat.actual} / ${cat.budget} KB</span>
                    </label>
                    <div class="progress-bar">
                        <div class="progress-fill ${getProgressColor(cat.actual, cat.budget)}" 
                             style="width: ${Math.min(100, (cat.actual / cat.budget) * 100)}%"></div>
                    </div>
                    <div class="budget-inputs">
                        <input type="number" value="${cat.actual}" min="0" 
                               onchange="updateActual('${cat.id}', this.value)" placeholder="Actual (KB)">
                        <input type="number" value="${cat.budget}" min="0" 
                               onchange="updateBudget('${cat.id}', this.value)" placeholder="Budget (KB)">
                    </div>
                </div>
            `).join('');
            
            updateTotals();
            updateChart();
        }
        
        function getProgressColor(actual, budget) {
            const ratio = actual / budget;
            if (ratio < 0.8) return 'green';
            if (ratio < 1) return 'yellow';
            return 'red';
        }
        
        function updateActual(id, value) {
            const cat = categories.find(c => c.id === id);
            if (cat) cat.actual = parseInt(value) || 0;
            renderBudgets();
        }
        
        function updateBudget(id, value) {
            const cat = categories.find(c => c.id === id);
            if (cat) cat.budget = parseInt(value) || 0;
            renderBudgets();
        }
        
        function updateTotals() {
            const totalActual = categories.reduce((sum, c) => sum + c.actual, 0);
            const totalBudget = categories.reduce((sum, c) => sum + c.budget, 0);
            const remaining = totalBudget - totalActual;
            const percent = Math.round((totalActual / totalBudget) * 100);
            
            document.getElementById('total-size').textContent = totalActual;
            document.getElementById('total-budget').textContent = totalBudget;
            document.getElementById('remaining').textContent = remaining;
            document.getElementById('remaining').className = `total-value ${remaining >= 0 ? 'green' : 'red'}`;
            document.getElementById('percent').textContent = percent + '%';
            document.getElementById('percent').className = `total-value ${percent < 80 ? 'green' : percent < 100 ? 'yellow' : 'red'}`;
        }
        
        function updateChart() {
            const total = categories.reduce((sum, c) => sum + c.actual, 0);
            if (total === 0) {
                document.getElementById('pie-chart').style.background = '#333';
                document.getElementById('legend').innerHTML = '<p style="color: #888;">No data to display</p>';
                return;
            }
            
            let gradient = 'conic-gradient(';
            let currentAngle = 0;
            
            categories.forEach((cat, i) => {
                if (cat.actual > 0) {
                    const angle = (cat.actual / total) * 360;
                    gradient += `${cat.color} ${currentAngle}deg ${currentAngle + angle}deg`;
                    if (i < categories.length - 1) gradient += ', ';
                    currentAngle += angle;
                }
            });
            gradient += ')';
            
            document.getElementById('pie-chart').style.background = gradient;
            
            document.getElementById('legend').innerHTML = categories
                .filter(c => c.actual > 0)
                .map(c => `
                    <div class="legend-item">
                        <div class="legend-color" style="background: ${c.color}"></div>
                        <span>${c.name}: ${c.actual} KB (${Math.round((c.actual / total) * 100)}%)</span>
                    </div>
                `).join('');
        }
        
        function applyPreset(name) {
            const preset = presets[name];
            document.getElementById('total-budget').textContent = preset.total;
            
            categories.forEach(cat => {
                cat.budget = preset[cat.id] || cat.budget;
            });
            
            renderBudgets();
        }
        
        function saveBudget() {
            const data = {
                categories: categories,
                timestamp: Date.now()
            };
            localStorage.setItem('performanceBudget', JSON.stringify(data));
            alert('Budget saved!');
        }
        
        function resetBudget() {
            categories.forEach(cat => {
                cat.actual = 0;
            });
            renderBudgets();
        }
        
        function exportReport() {
            const totalActual = categories.reduce((sum, c) => sum + c.actual, 0);
            const totalBudget = categories.reduce((sum, c) => sum + c.budget, 0);
            
            let report = '# Performance Budget Report\n\n';
            report += `Generated: ${new Date().toISOString()}\n\n`;
            report += `## Summary\n`;
            report += `- Total Size: ${totalActual} KB\n`;
            report += `- Total Budget: ${totalBudget} KB\n`;
            report += `- Remaining: ${totalBudget - totalActual} KB\n`;
            report += `- Budget Used: ${Math.round((totalActual / totalBudget) * 100)}%\n\n`;
            report += `## Resource Breakdown\n\n`;
            report += '| Resource | Actual (KB) | Budget (KB) | Status |\n';
            report += '|----------|-------------|-------------|--------|\n';
            
            categories.forEach(cat => {
                const status = cat.actual <= cat.budget ? '✅' : '❌';
                report += `| ${cat.name} | ${cat.actual} | ${cat.budget} | ${status} |\n`;
            });
            
            const blob = new Blob([report], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'performance-budget.md';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Load saved data
        const saved = localStorage.getItem('performanceBudget');
        if (saved) {
            const data = JSON.parse(saved);
            data.categories.forEach(saved => {
                const cat = categories.find(c => c.id === saved.id);
                if (cat) {
                    cat.actual = saved.actual;
                    cat.budget = saved.budget;
                }
            });
        }
        
        renderBudgets();
    </script>
</body>
</html>
